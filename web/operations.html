<!doctype html>
<html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Operations · HQ</title><link rel="stylesheet" href="hq.css">
<main>
  <header class="top"><div><div class="eyebrow">FADEWELL HQ</div><h1>Operations</h1><p class="muted">Relisty, nowe listingi i tylko te wyjątki, których system nie rozwiązał sam.</p></div><span class="badge">Prototyp równoległy</span></header>
  <nav id="nav"></nav><div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div>
  <section id="app" hidden><div class="section-title"><h2>Nowe listingi do połączenia</h2><span id="count" class="muted small"></span></div><p class="notice small">Resolver łączy sam tylko jednoznaczne przypadki. Tu pozostają wyłącznie sugestie do potwierdzenia albo niejednoznaczne listingi.</p><div id="unlinked" class="stack"></div><div class="section-title"><h2>Pozostałe sprawy</h2><span id="reviewCount" class="muted small"></span></div><div id="queue" class="stack"></div></section>
</main>
<script type="module">
import {shell,data,$,safe,date,money,sb} from './hq.js';
let state;
const vintedUrl=id=>`https://www.vinted.pl/items/${encodeURIComponent(id)}`;
const stop=new Set(['jeans','denim','vintage','pants','fit','blue','black','size','with','the','and','new']);
const words=value=>new Set((String(value||'').toLowerCase().match(/[a-z0-9]+/g)||[]).filter(word=>word.length>=3&&!stop.has(word)));
const size=value=>new Set([...String(value||'').toLowerCase().matchAll(/\b([wl])\s*(\d{2})\b/g)].map(match=>`${match[1]}${match[2]}`));
const model=value=>new Set([...String(value||'').toLowerCase().matchAll(/\b(\d{3,4})\b/g)].map(match=>match[1]));
function suggest(row){
  const marker=String(row.title||'').match(/#den[-_ ]?0*(\d{1,5})\b/i);const listingText=row.title||'';
  const candidates=state.items.filter(item=>item.ledger_status==='UNLISTED-BACKLOG'&&!item.vinted_item_id).map(item=>{
    if(marker&&item.item_id===`DEN-${String(Number(marker[1])).padStart(3,'0')}`)return{item,score:1000,reasons:['marker #den']};
    const itemText=`${item.name||''} ${item.category||''} ${item.advantage||''}`,shared=[...words(listingText)].filter(word=>words(itemText).has(word)),sameSize=[...size(listingText)].filter(value=>size(itemText).has(value)),sameModel=[...model(listingText)].filter(value=>model(itemText).has(value));
    const score=Math.min(38,shared.length*8)+sameSize.length*22+(sameModel.length?30:0);return{item,score,reasons:[shared.length?`słowa: ${shared.slice(0,3).join(', ')}`:'',sameSize.length?`rozmiar: ${sameSize.join(', ')}`:'',sameModel.length?`model: ${sameModel.join(', ')}`:''].filter(Boolean)};
  }).sort((a,b)=>b.score-a.score);const best=candidates[0],next=candidates[1];if(!best||!best.score)return null;return {...best,confidence:best.score===1000?'PEWNE':best.score>=35?'SUGESTIA':'SŁABE',margin:best.score-(next?.score||0)};
}
const denOptions=(items,selected='')=>'<option value="">Wybierz DEN…</option>'+items.filter(item=>item.ledger_status!=='SOLD').map(item=>`<option value="${safe(item.item_id)}" ${item.item_id===selected?'selected':''}>${safe(item.item_id)} · ${safe(item.name||'Bez nazwy')}</option>`).join('');
function missingCard(item){return`<article class="card"><div class="row-actions"><span class="status unlisted">MISSING LIVE</span><b>${safe(item.item_id)}</b><span class="muted small">brak od ${safe(date(state.latestCapturedAt))}</span></div><h3>${safe(item.name||'Bez nazwy')}</h3><p class="muted small">Może to być sprzedaż, ukrycie albo relist — status nie zmienia się automatycznie.</p><p class="row-actions"><a class="button" href="actions.html?item=${encodeURIComponent(item.item_id)}">Sprawdź i zapisz akcję</a>${item.listing_url?`<a class="button secondary" target="_blank" rel="noreferrer" href="${safe(item.listing_url)}">Otwórz ofertę</a>`:''}</p></article>`;}
function card(row){const proposed=suggest(row),actionable=proposed&&proposed.confidence!=='SŁABE',selected=actionable?proposed.item.item_id:'',note=actionable?`${proposed.confidence}: ${proposed.item.item_id} · ${proposed.reasons.join(' · ')||'porównanie tytułu'}`:'Brak bezpiecznej sugestii — wybierz ręcznie.';return`<article class="card"><div class="row-actions"><span class="status unlisted">UNLINKED LIVE</span><b>${safe(row.vinted_item_id)}</b><a class="text-link small" href="${safe(vintedUrl(row.vinted_item_id))}" target="_blank" rel="noreferrer">Otwórz Vinted</a></div><div class="two-col"><div>${row.photo_url?`<img class="photo large" src="${safe(row.photo_url)}" alt="">`:''}</div><div><h3>${safe(row.title||'Bez tytułu')}</h3><p><b>${money(row.price_pln)}</b><span class="muted small"> · ${safe(row.favourites||0)} likes</span></p><p class="notice small">${safe(note)}</p><label>Połącz z itemem DEN<select data-den="${safe(row.vinted_item_id)}">${denOptions(state.items,selected)}</select></label><p><button data-link="${safe(row.vinted_item_id)}">${actionable?'Potwierdź sugestię':'Połącz z ofertą'}</button></p><p id="result-${safe(row.vinted_item_id)}" class="muted small"></p></div></div></article>`;}
function render(){const unlinkedListings=state.snapshots.filter(row=>!state.linked.has(String(row.vinted_item_id))),missingItems=state.missing||[];count.textContent=`${unlinkedListings.length} do połączenia · snapshot ${date(state.latestCapturedAt)}${state.pendingConfirmation.length?` · ${state.pendingConfirmation.length} czeka na drugi snapshot`:''}`;unlinked.innerHTML=unlinkedListings.length?unlinkedListings.map(card).join(''):'<article class="card empty"><b class="ok">✓ Wszystkie aktualne listingi DEN są połączone.</b></article>';reviewCount.textContent=`${missingItems.length+state.reviews.length} otwartych spraw`;queue.innerHTML=(missingItems.map(missingCard).join('')+state.reviews.map(review=>`<article class="card"><b>${safe(review.kind||'REVIEW')}</b><p>${safe(review.detail||'Brak opisu.')}</p></article>`).join(''))||'<article class="card empty"><b class="ok">✓ Kolejka jest czysta.</b></article>';unlinked.querySelectorAll('button[data-link]').forEach(button=>button.onclick=()=>link(button.dataset.link));}
async function link(vintedId){const row=state.snapshots.find(snapshot=>String(snapshot.vinted_item_id)===String(vintedId)),select=unlinked.querySelector(`select[data-den="${CSS.escape(String(vintedId))}"]`),result=$(`result-${vintedId}`),button=unlinked.querySelector(`button[data-link="${CSS.escape(String(vintedId))}"]`);if(!select?.value){result.className='bad small';result.textContent='Najpierw wybierz DEN.';return;}const chosen=state.items.find(item=>item.item_id===select.value);if(!chosen||chosen.ledger_status==='SOLD'){result.className='bad small';result.textContent='Wybierz aktywny item DEN.';return;}button.disabled=true;result.textContent='Zapisuję połączenie…';const payload={action_type:'LISTED',item_id:chosen.item_id,occurred_on:new Date().toISOString().slice(0,10),amount:row.price_pln??null,vinted_item_id:String(row.vinted_item_id),listing_url:vintedUrl(row.vinted_item_id),live_title:row.title||null,note:`Operations: potwierdzone połączenie live listingu ${row.vinted_item_id}.`,external_key:`operations-link-${row.vinted_item_id}`};const{error}=await sb.rpc('apply_hq_ledger_action_owner',{p:payload});if(error){button.disabled=false;result.className='bad small';result.textContent=`Nie zapisano: ${error.message||'nieznany błąd'}.`;return;}state=await data();render();}
if(await shell('operations.html')){app.hidden=false;try{state=await data();render();}catch(error){app.innerHTML=`<div class="notice">Nie udało się wczytać kolejki: ${safe(error.message||error)}</div>`;}}
</script></html>
