<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HQ Operations</title><style>body{margin:0;background:#101010;color:#f5f0e8;font:15px system-ui}main{max-width:1100px;margin:auto;padding:32px}.muted{color:#aaa}nav{display:flex;gap:8px;margin:14px 0}a{background:#e7d4ae;color:#151515;text-decoration:none;font-weight:700;padding:9px 12px;border-radius:7px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:#1b1b1b;border:1px solid #34312d;border-radius:12px;padding:18px}.clear{color:#9ed38e;font-size:22px;font-weight:700}.item{padding:12px 0;border-bottom:1px solid #34312d}.tag{display:inline-block;border:1px solid #777;border-radius:999px;padding:2px 7px;font-size:12px}@media(max-width:700px){.grid{grid-template-columns:1fr}main{padding:18px}}</style><main><h1>Operations</h1><p class="muted">Inbox wyjątków. Tylko sprawy wymagające uwagi — nie pełny magazyn.</p><nav><a href="/">HQ Home</a><a href="/ledger">Ledger</a><a href="/actions">Action Studio</a><a href="/readiness">System Health</a></nav><section id="summary" class="card"></section><section class="grid"><article class="card"><h2>Do weryfikacji</h2><div id="queue"></div></article><article class="card"><h2>Drafty</h2><div id="drafts"></div></article></section></main><script>const $=x=>document.getElementById(x);fetch('/api/operations').then(r=>r.json()).then(d=>{summary.innerHTML=d.queue.length?`<b>${d.queue.length}</b> otwartych spraw.`:`<div class="clear">✓ Inbox czysty</div><p class="muted">Brak nierozstrzygniętych linków, relistów i missingów.</p>`;queue.innerHTML=d.queue.length?d.queue.map(x=>`<div class="item"><span class="tag">${x.kind}</span><br><b>${x.item_id||x.vinted_item_id}</b><p class="muted">${x.detail}</p></div>`).join(''):'<p class="muted">Wszystko uporządkowane.</p>';drafts.innerHTML=d.drafts.length?d.drafts.map(x=>`<div class="item"><b>${x.item_id}</b> · ${x.action_type}<br><span class="muted">${x.occurred_on||'bez daty'} · ${x.amount||'—'} PLN</span></div>`).join(''):'<p class="muted">Brak draftów.</p>'})</script></html>
