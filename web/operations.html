<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HQ Operations</title><link rel="stylesheet" href="hq.css"><main><h1>Operations</h1><p class="muted">Inbox wyjątków. Tylko sprawy wymagające uwagi.</p><nav id="nav"></nav><button id="login">Zaloguj przez GitHub</button> <button id="logout" hidden>Wyloguj</button><p id="status" class="muted"></p><section id="app" hidden class="card"><h2>Do weryfikacji</h2><div id="queue"></div></section></main><script type="module">import{shell,data,$,safe}from'./hq.js';if(await shell('operations.html')){app.hidden=false;const d=await data();queue.innerHTML=d.reviews.length?d.reviews.map(r=>`<article class="card"><b>${safe(r.kind)}</b> · ${safe(r.item_id||r.vinted_item_id)}<p class="muted">${safe(r.detail)}</p></article>`).join(''):'<p class="ok">✓ Inbox czysty — brak nierozstrzygniętych linków, relistów i missingów.</p>'}</script></html>
