<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>System · FADEWELL HQ</title><link rel="stylesheet" href="hq.css"><main><header class="top"><div><div class="eyebrow">FADEWELL HQ</div><h1>System</h1><p class="muted">Stan danych, synchronizacji i integralności operacyjnej.</p></div><span class="badge">Diagnostics</span></header><nav id="nav"></nav><div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div><section id="app" hidden class="stack"><section id="metrics" class="grid"></section><article class="card"><h2>Diagnostyka</h2><div id="checks" class="feed"></div></article><article class="card"><h2>Granice systemu</h2><p class="muted">Vinted dostarcza obserwacje ofert. HQ nie wystawia ani nie edytuje ofert na Vinted. Księgowość DEN jest prowadzona wyłącznie w Supabase HQ; korekty są nowymi zdarzeniami.</p></article></section></main><script type="module">import{shell,data,$,safe,date,dateTime}from'./hq.js?v=20260714b';if(await shell('system.html')){app.hidden=false;try{const d=await data(),latest=d.snapshots[0]?.captured_at,minutes=latest?Math.round((Date.now()-new Date(latest))/60000):null,open=d.reviews.length+d.pendingGmailReviews.length,missing=d.items.filter(x=>!x.item_id||!x.ledger_status).length;metrics.innerHTML=[['Itemy DEN',d.items.length],['Snapshoty live',d.snapshots.length],['Otwarte sprawy',open],['Ostatni snapshot',latest?date(latest):'Brak']].map(([a,v])=>`<article class="card metric"><div class="n">${safe(v)}</div><div class="label">${safe(a)}</div></article>`).join('');checks.innerHTML=[['Collector Vinted',minutes===null?'Brak danych':minutes<=90?'Działa':'Wymaga uwagi',latest?`ostatni snapshot ${dateTime(latest)}`:'brak kompletnego snapshotu'],['Gmail',d.gmailError?'Wymaga uwagi':open?'Przegląd wymagany':'Bez otwartych spraw',d.gmailError?'Nie udało się pobrać zdarzeń Gmail.':`${d.pendingGmailReviews.length} zdarzeń oczekuje na decyzję.`],['Integralność DEN',missing?'Wymaga uwagi':'Spójna',missing?`${missing} rekordów bez wymaganego klucza/stanu.`:'Każdy odczytany rekord ma DEN i status.']].map(([a,s,detail])=>`<div class="feed-item"><b>${safe(a)} · ${safe(s)}</b><p class="muted small">${safe(detail)}</p></div>`).join('')}catch(e){app.innerHTML=`<div class="notice">Nie udało się wczytać diagnostyki: ${safe(e.message||e)}</div>`}}</script></html>
