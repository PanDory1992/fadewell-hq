<!doctype html>
<html lang="pl">
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pricing · FADEWELL HQ</title><link rel="stylesheet" href="hq.css">
<style>
  .pricing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:0;border-left:1px solid var(--line);border-top:1px solid var(--line)}
  .pricing-grid .card{border-left:0;border-top:0}
  .pricing-card h3{font-size:16px}.pricing-card p{margin:7px 0}
  .pricing-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);border-radius:0;overflow:hidden;margin:12px 0}
  .pricing-meta div{padding:8px;background:#f8f4ed;border-right:1px solid var(--line)}.pricing-meta div:last-child{border-right:0}.pricing-meta b{display:block;margin-top:2px}
  .pricing-action{color:var(--brown);font:700 12px/1 "Oswald",sans-serif;letter-spacing:.08em;text-transform:uppercase}
  .pricing-action.keep{color:var(--green)}.pricing-action.presentation{color:var(--blue)}.pricing-action.observe{color:var(--muted)}.pricing-action.test_lower{color:#e9c37c}.pricing-action.raise{color:#e9c37c}
  .pricing-note{min-height:43px}.pricing-proof{font-size:12px;color:var(--muted)}
  @media(max-width:600px){.pricing-meta{grid-template-columns:1fr 1fr}}
</style>
<main>
  <header class="top"><div><div class="eyebrow">FADEWELL HQ · Pricing cockpit</div><h1>Co dziś zrobić z ceną.</h1><p class="muted">Rekomendacje są obserwacją. HQ nigdy nie zmienia ceny automatycznie.</p></div><span class="badge">Advisory</span></header>
  <nav id="nav"></nav>
  <div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div>
  <section id="app" hidden>
    <section id="summary" class="grid decision-strip"></section>
    <section class="decision-layout">
      <section><div class="section-title"><div><h2>Dzisiejsze decyzje</h2><p class="muted small">Najpierw największy wpływ i najwyższa pewność. Klik prowadzi do osi prawdy DEN.</p></div><span id="count" class="muted small"></span></div><div id="rows" class="pricing-grid"></div></section>
      <aside id="context" class="card context-card"></aside>
    </section>
  </section>
</main>
<script type="module">
import{shell,data,$,safe,money,sb,itemTitle}from'./hq.js?v=20260719-title';
import{buildCockpit}from'./pricing.js?v=20260716f';
const actionLabel={KEEP:'Zostaw cenę',OBSERVE:'Obserwuj',TEST_LOWER:'Testuj małą obniżkę',RAISE:'Podnieś cenę',PRESENTATION:'Popraw prezentację'};
const actionClass=value=>({KEEP:'keep',OBSERVE:'observe',TEST_LOWER:'test_lower',RAISE:'raise',PRESENTATION:'presentation'}[value]||'observe');
const num=value=>Number(value)||0;
function card(row){
  const{item,model,signal,decision,range}=row;
  const confidence=model.status==='READY'?({HIGH:'wysoka',MEDIUM:'średnia',LOW:'niska'}[model.confidence]):'brak';
  const estimate=range?`${money(range.low)} – ${money(range.high)}`:'Brak estymaty';
  const likes=`${signal.likes??0} likes${signal.likesDelta===null?'':` · ${signal.likesDelta>=0?'+':''}${signal.likesDelta} / ${signal.historyDays} dni`}`;
  const price=signal.price||num(item.live_list_price),lastChange=signal.priceChanges.at(-1),previous=lastChange?signal.rows[signal.rows.indexOf(lastChange)-1]:null,changeText=lastChange&&previous?`Ostatnia zmiana ceny: ${Math.max(0,Math.floor((Date.now()-new Date(lastChange.captured_at))/86400000))} dni temu, ${num(lastChange.price_pln)-num(previous.price_pln)>=0?'+':''}${num(lastChange.price_pln)-num(previous.price_pln)} zł.`:'';
  return`<article class="card pricing-card"><div class="row-actions"><span class="pricing-action ${actionClass(decision.action)}">${safe(actionLabel[decision.action])}</span><span class="muted small">${safe(item.item_id)}</span></div><h3>${safe(itemTitle(item))}</h3><div class="pricing-meta"><div><span class="muted small">Cena teraz</span><b>${money(price)}</b></div><div><span class="muted small">Estymata close</span><b>${safe(estimate)}</b></div><div><span class="muted small">Kapitał / break-even</span><b>${money(decision.floor)}</b></div><div><span class="muted small">Dni live</span><b>${safe(signal.daysLive??'—')}</b></div><div><span class="muted small">Likes</span><b>${safe(likes)}</b></div></div><p class="pricing-note">${safe(decision.reason)}</p>${changeText?`<p class="muted small">${safe(changeText)}</p>`:''}${decision.nextPrice?`<p><b>${decision.action==='RAISE'?'Proponowana cena':'Następny test'}:</b> ${money(decision.nextPrice)}</p><button class="secondary" data-price-test="${safe(item.item_id)}" data-price="${safe(decision.nextPrice)}">Zapisz test ceny</button>`:''}<p class="pricing-proof">Pewność: ${safe(confidence)} · ${safe(model.reason||'brak porównań')}</p><p class="row-actions"><a class="button secondary" href="ledger.html?item=${encodeURIComponent(item.item_id)}">Oś prawdy</a>${item.listing_url?`<a class="button secondary" target="_blank" rel="noreferrer" href="${safe(item.listing_url)}">Vinted</a>`:''}</p></article>`;
}
if(await shell('pricing.html')){
  app.hidden=false;
  try{
    const d=await data();
    const history=await sb.from('hq_listing_snapshots').select('vinted_item_id,captured_at,price_pln,favourites,views,visible').like('source','github_actions_vinted%').order('captured_at',{ascending:false}).limit(5000);
    if(history.error)throw history.error;
    const cockpit=buildCockpit(d.items,history.data||[]);
    const ready=cockpit.rows.filter(row=>row.model.status==='READY').length;
    const actions=cockpit.rows.filter(row=>['TEST_LOWER','RAISE'].includes(row.decision.action)).length;
    const presentation=cockpit.rows.filter(row=>row.decision.action==='PRESENTATION').length;
    summary.innerHTML=[['Do zmiany ceny',actions],['Wymaga decyzji',presentation],['Live listingi',cockpit.rows.length]].map(([label,value])=>`<article class="card metric"><div class="n">${safe(value)}</div><div class="label">${safe(label)}</div></article>`).join('');
    count.textContent=`${cockpit.rows.length} aktywnych listingów`;
    const snapshot=d.latestCapturedAt?new Date(d.latestCapturedAt).toLocaleString('pl-PL'):'brak danych';
    context.innerHTML=`<h2>Kontekst dnia</h2><div class="feed"><div class="feed-item"><b>Świeżość snapshotu</b><p class="muted small">${safe(snapshot)}</p></div><div class="feed-item"><b>Priorytetowe kroki</b><p><span class="context-number">1</span> Zmień ceny tylko tam, gdzie HQ daje konkretny następny test.</p><p><span class="context-number">2</span> Sprawdź prezentację, gdy cena nie jest główną barierą.</p><p><span class="context-number">3</span> Zapisz decyzję — Vinted zmieniasz świadomie poza HQ.</p></div><div class="feed-item"><b>Kalibracja</b><p class="muted small">${safe(cockpit.calibration.status==='CALIBRATED'?`Gotowa · ${cockpit.calibration.count} obserwacji`:`Zbiera dane · ${cockpit.calibration.count} obserwacji`)}</p></div></div>`;
    rows.innerHTML=cockpit.rows.map(card).join('')||'<article class="card empty">Brak aktywnych ofert powiązanych z DEN.</article>';rows.querySelectorAll('button[data-price-test]').forEach(button=>button.onclick=async()=>{button.disabled=true;const{error}=await sb.rpc('record_hq_price_test_owner',{p:{item_id:button.dataset.priceTest,price:button.dataset.price,external_key:crypto.randomUUID()}});if(error){button.disabled=false;button.textContent='Nie zapisano';return}button.textContent='Test zapisany'});
  }catch(error){app.innerHTML=`<div class="notice">Nie udało się wczytać Pricing: ${safe(error.message||error)}</div>`;}
}
</script>
</html>
