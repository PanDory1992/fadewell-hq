<!doctype html>
<html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HQ System health</title>
<style>body{margin:0;background:#101010;color:#f5f0e8;font:15px system-ui}main{max-width:900px;margin:auto;padding:32px}.card{background:#1b1b1b;border:1px solid #34312d;border-radius:10px;padding:16px;margin:12px 0}.ok{color:#9ed38e}.no{color:#f2aa83}.muted{color:#aaa}h1{margin-bottom:4px}nav{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}a{background:#e7d4ae;color:#151515;text-decoration:none;font-weight:700;padding:9px 12px;border-radius:7px}</style>
<main><h1>System health</h1><nav><a href="/">HQ Home</a><a href="/ledger">Ledger</a><a href="/operations">Operations</a><a href="/actions">Action Studio</a><a href="/cloud">Cloud view</a></nav><p id="headline" class="muted">Ładowanie…</p><section id="gates"></section><section class="card"><h2>Wyjątki danych</h2><div id="warnings" class="muted"></div></section></main>
<script>fetch('/api/readiness').then(r=>r.json()).then(d=>{headline.textContent=d.ready?'System działa na canonical HQ.':'Co najmniej jedna bramka wymaga uwagi.';gates.innerHTML=d.gates.map(g=>`<article class="card"><h2 class="${g.ok?'ok':'no'}">${g.ok?'✓':'×'} ${g.name}</h2><p class="muted">${g.detail}</p></article>`).join('');warnings.innerHTML=d.warnings.length?d.warnings.map(w=>`<p><b>${w.item_id}</b> · ${w.code}<br>${w.detail}</p>`).join(''):'Brak.'})</script>
</html>
