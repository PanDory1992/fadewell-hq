<!doctype html>
<html lang="pl">
  <meta charset="utf-8" /><meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  /><title>Triage stocku · FADEWELL HQ</title
  ><link rel="stylesheet" href="hq.css" />
  <main>
    <header class="top">
      <div>
        <div class="eyebrow">FADEWELL HQ · Triage</div>
        <h1>Odblokuj kapitał w stocku.</h1>
        <p class="muted">
          Najpierw pary z największym oczekiwanym zyskiem; potem fakty potrzebne
          do dobrej oferty.
        </p>
      </div>
      <span id="count" class="badge"></span>
    </header>
    <nav id="nav"></nav>
    <div class="row-actions">
      <button id="login">Zaloguj przez GitHub</button
      ><button id="logout" hidden class="secondary">Wyloguj</button
      ><span id="status" class="muted small"></span>
    </div>
    <section id="app" hidden><div id="items" class="live-grid"></div></section>
  </main>
  <script type="module">
    import {
      shell,
      data,
      $,
      safe,
      money,
      itemTitle,
      itemPhoto,
    } from "./hq.js?v=20260714b";
    const needed = ["brand", "model", "tagged_size", "condition"],
      facts = (x) => x.item_dna?.facts || {},
      missing = (x) => needed.filter((k) => !String(facts(x)[k] || "").trim()),
      complete = (x) => !missing(x).length;
    if (await shell("triage.html")) {
      app.hidden = false;
      try {
        const d = await data(),
          stock = d.items
            .filter(
              (x) => x.ledger_status === "UNLISTED-BACKLOG" && !complete(x),
            )
            .sort(
              (a, b) =>
                (Number(b.estimate_net_profit) || -Infinity) -
                (Number(a.estimate_net_profit) || -Infinity),
            );
        count.textContent = `${stock.length} do wystawienia`;
        items.innerHTML =
          stock
            .map((x) => {
              const photo = itemPhoto(x, d.snapshots),
                missingText = missing(x)
                  .map(
                    (k) =>
                      ({
                        brand: "marka",
                        model: "model",
                        tagged_size: "rozmiar z metki",
                        condition: "stan",
                      })[k],
                  )
                  .join(" · ");
              return `<article class="card live-card">${photo ? `<img class="photo" src="${safe(photo)}" alt="">` : '<div class="photo"></div>'}<div><h3>${safe(x.item_id)} · ${safe(itemTitle(x))}</h3><p><b>${money(x.estimate_net_profit)}</b> <span class="muted small">oczekiwany zysk</span></p><p class="muted small">Brakuje: ${safe(missingText)}</p><p class="row-actions"><a class="button secondary" href="item-dna.html?items=${encodeURIComponent(x.item_id)}">Uzupełnij DNA</a></p></div></article>`;
            })
            .join("") ||
          '<article class="card empty">Brak niewystawionego stocku wymagającego DNA.</article>';
      } catch (e) {
        app.innerHTML = `<div class="notice">Nie udało się wczytać triage: ${safe(e.message || e)}</div>`;
      }
    }
  </script>
</html>
