<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Triage stocku · FADEWELL HQ</title><link rel="stylesheet" href="hq.css"><main><header class="top"><div><div class="eyebrow">FADEWELL HQ · Triage</div><h1>Odblokuj kapitał w stocku.</h1><p class="muted">Najpierw pary z największym oczekiwanym zyskiem; potem fakty potrzebne do dobrej oferty.</p></div><span id="count" class="badge"></span></header><nav id="nav"></nav><div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div><section id="app" hidden><div id="items" class="live-grid"></div></section></main><script type="module">import{shell,data,$,safe,money,itemTitle,itemPhoto,toast}from'./hq.js?v=20260714b';const needed=['brand','model','tagged_size','condition','waist_cm','inseam_cm'];const complete=x=>needed.every(k=>(x.item_dna?.facts||{})[k]!==undefined&&String((x.item_dna?.facts||{})[k]).trim()!==''),draft=x=>{const f=x.item_dna.facts,title=`${f.brand} ${f.model} Jeans - ${f.wash||'denim'} - ${f.tagged_size}`;return`${title}\n\n${f.brand} ${f.model} jeans, carefully checked and hand-measured by me.\n\nFit: ${f.fit||'see measurements below'}.\nCondition: ${f.condition}.\n\nTagged size: ${f.tagged_size}\nMeasurements flat: waist ${f.waist_cm} cm · inseam ${f.inseam_cm} cm${f.rise_cm?` · front rise ${f.rise_cm} cm`:''}.\n\nPhotos taken in natural light; colour may vary slightly. Happy to answer questions.`};if(await shell('triage.html')){app.hidden=false;try{const d=await data(),stock=d.items.filter(x=>x.ledger_status==='UNLISTED-BACKLOG').sort((a,b)=>(Number(b.estimate_net_profit)||-Infinity)-(Number(a.estimate_net_profit)||-Infinity));count.textContent=`${stock.length} do wystawienia`;items.innerHTML=stock.map(x=>{const ready=complete(x),photo=itemPhoto(x,d.snapshots);return`<article class="card live-card">${photo?`<img class="photo" src="${safe(photo)}" alt="">`:'<div class="photo"></div>'}<div><h3>${safe(x.item_id)} · ${safe(itemTitle(x))}</h3><p><b>${money(x.estimate_net_profit)}</b> <span class="muted small">oczekiwany zysk</span></p><p class="muted small">Checklist: ${ready?'✓ DNA kompletne':'○ model · rozmiar · stan · wymiary'} · ○ min. 5 zdjęć · ○ #DEN w ofercie</p><p class="row-actions"><a class="button secondary" href="item-dna.html?items=${encodeURIComponent(x.item_id)}">Uzupełnij DNA</a>${ready?`<button data-draft="${safe(x.item_id)}">Wygeneruj listing</button>`:''}</p></div></article>`}).join('')||'<article class="card empty">Brak niewystawionego stocku.</article>';items.querySelectorAll('button[data-draft]').forEach(b=>b.onclick=async()=>{const x=stock.find(x=>x.item_id===b.dataset.draft);await navigator.clipboard.writeText(draft(x));toast('Draft listing skopiowany')})}catch(e){app.innerHTML=`<div class="notice">Nie udało się wczytać triage: ${safe(e.message||e)}</div>`}}</script></html>
