<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Action Studio</title><link rel="stylesheet" href="hq.css"><main><h1>Action Studio</h1><p class="muted">Zapis atomowy do canonical HQ. Vinted i Google pozostają nietknięte.</p><nav id="nav"></nav><button id="login">Zaloguj przez GitHub</button> <button id="logout" hidden>Wyloguj</button><p id="status" class="muted"></p><section id="app" hidden class="card"><select id="kind"><option value="SALE">Sprzedaż</option><option value="LISTED">Wystawienie</option><option value="PURCHASE">Nowy zakup</option></select><select id="item"></select><div id="purchase" class="action"><p class="muted">DEN ID zostanie nadany automatycznie.</p><input id="name" placeholder="Nazwa itemu"><input id="source" placeholder="Sourcing type"><input id="tier" placeholder="Tier"><input id="cost" type="number" step="0.01" placeholder="Koszt zakupu"><input id="delivery" type="number" step="0.01" placeholder="Dostawa"></div><input id="date" type="date"><input id="amount" type="number" step="0.01" placeholder="Cena sprzedaży PLN"><p id="profit" class="muted"></p><div id="listed" class="action"><input id="vinted" placeholder="Vinted Item ID"><input id="url" placeholder="Vinted URL"><input id="title" placeholder="Live title"></div><textarea id="note" placeholder="Notatka — opcjonalnie"></textarea><button id="save">Zapisz akcję</button><p id="result" class="muted"></p></section></main><script type="module">import{shell,data,$,money,sb}from'./hq.js';let items=[];function toggle(){const k=kind.value,p=k==='PURCHASE',l=k==='LISTED',s=k==='SALE';purchase.style.display=p?'block':'none';item.style.display=p?'none':'block';listed.style.display=l?'block':'none';amount.placeholder=s?'Cena sprzedaży PLN':l?'Cena listy PLN':'Kwota PLN';profit()}function profit(){const i=items.find(x=>x.item_id===item.value),price=Number(amount.value);$('profit').textContent=kind.value==='SALE'&&Number.isFinite(price)&&i?`Zysk netto policzy się automatycznie: ${money(price-(+i.total_capital||0))}.`:kind.value==='SALE'?'Zysk netto policzy się automatycznie z kapitału itemu.':''}async function saveAction(){const k=kind.value,p={action_type:k,item_id:k==='PURCHASE'?'':item.value,occurred_on:date.value,amount:amount.value,note:note.value,external_key:crypto.randomUUID()};if(k==='PURCHASE'){Object.assign(p,{name:name.value,sourcing_type:source.value,flip_tier:tier.value,purchase_cost:cost.value,delivery_cost:delivery.value,total_capital:((+cost.value||0)+(+delivery.value||0)).toFixed(2)})}if(k==='LISTED')Object.assign(p,{vinted_item_id:vinted.value,listing_url:url.value,live_title:title.value});$('save').disabled=true;const{error}=await sb.rpc('apply_hq_ledger_action_owner',{p});$('save').disabled=false;result.className=error?'bad':'ok';result.textContent=error?.message||'Zapisano w canonical HQ.';if(!error)setTimeout(()=>location.href='ledger.html',600)}if(await shell('actions.html')){app.hidden=false;items=(await data()).items;item.innerHTML='<option value="">Wybierz item</option>'+items.filter(i=>i.ledger_status!=='SOLD').map(i=>`<option value="${i.item_id}">${i.item_id} · ${i.name||''}</option>`).join('');const q=new URLSearchParams(location.search);if(q.get('item'))item.value=q.get('item');date.value=new Date().toISOString().slice(0,10);kind.onchange=toggle;item.onchange=profit;amount.oninput=profit;$('save').onclick=saveAction;toggle()}</script></html>
