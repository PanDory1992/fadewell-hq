<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Akcje · FADEWELL HQ</title><link rel="stylesheet" href="hq.css"><main><header class="top"><div><div class="eyebrow">FADEWELL HQ</div><h1>Akcje</h1><p class="muted">Każda decyzja tworzy audytowalne zdarzenie — nic nie nadpisuje historii.</p></div><span class="badge">Canonical DEN</span></header><nav id="nav"></nav><div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div><section id="app" hidden class="split"><article class="card stack"><label>Rodzaj akcji<select id="kind"><option value="SALE">Sprzedaż</option><option value="LISTED">Wystawienie</option><option value="ADJUSTMENT">Korekta / notatka księgowa</option><option value="PURCHASE">Nowy zakup</option></select></label><label id="itemWrap">DEN<select id="item"></select></label><div id="purchase" class="hidden"><label>Nazwa itemu<input id="name" placeholder="np. Levi's 501 W32 L32"></label><div class="two-col"><label>Koszt zakupu<input id="cost" type="number" min="0" step="0.01"></label><label>Dostawa<input id="delivery" type="number" min="0" step="0.01" value="0"></label></div><label>Źródło<input id="source" placeholder="np. Vinted"></label></div><div id="listing" class="hidden"><label>Vinted Item ID<input id="vinted"></label><label>URL oferty<input id="url" placeholder="https://www.vinted.pl/items/…"></label><label>Tytuł z Vinted<input id="title"></label></div><label id="dateWrap">Data<input id="date" type="date"></label><label id="amountWrap">Kwota PLN<input id="amount" type="number" min="0" step="0.01"></label><label>Notatka / dowód<textarea id="note" placeholder="Dla korekty wyjaśnij, co i dlaczego."></textarea></label><div class="row-actions"><button id="save">Zapisz akcję</button><span id="result" class="muted"></span></div></article><aside class="card"><h2>Kontrola przed zapisem</h2><div id="preview" class="muted">Wybierz akcję.</div></aside></section></main><script type="module">import{shell,data,$,safe,money,sb,itemTitle,toast}from'./hq.js';let items=[];const selected=()=>items.find(x=>x.item_id===item.value);function render(){const k=kind.value,p=k==='PURCHASE',l=k==='LISTED',s=k==='SALE';purchase.classList.toggle('hidden',!p);listing.classList.toggle('hidden',!l);itemWrap.classList.toggle('hidden',p);amountWrap.classList.toggle('hidden',k==='ADJUSTMENT');dateWrap.classList.toggle('hidden',p);amount.placeholder=s?'Cena sprzedaży':l?'Cena listy':'Kwota';const x=selected();preview.innerHTML=s?`<b>${safe(x?.item_id||'Wybierz DEN')} · ${safe(itemTitle(x||{}))}</b><p>Sprzedaż zapisze cenę i wynik z istniejącego kapitału.</p>`:k==='ADJUSTMENT'?'<b>Korekta</b><p>Powstanie nowe zdarzenie z Twoim uzasadnieniem; historia pozostaje nienaruszona.</p>':l?'<b>Wystawienie</b><p>Połączy DEN z ofertą Vinted.</p>':'<b>Nowy zakup</b><p>HQ utworzy nowy DEN.</p>'}async function saveAction(){const k=kind.value,x=selected(),amount=amountWrap.classList.contains('hidden')?null:amountWrap.querySelector('input').value;if(!['PURCHASE'].includes(k)&&!x){result.textContent='Wybierz DEN.';return}if(k==='ADJUSTMENT'&&!note.value.trim()){result.textContent='Korekta wymaga uzasadnienia.';return}if(k==='SALE'&&(!amount||Number(amount)<0)){result.textContent='Podaj prawidłową cenę.';return}if(k==='SALE'&&!confirm(`${x.item_id} · ${itemTitle(x)} · ${money(amount)} — potwierdź sprzedaż.`))return;if(k==='LISTED'&&!vinted.value.trim()){result.textContent='Podaj Vinted Item ID.';return}save.disabled=true;try{let payload;if(k==='PURCHASE'){if(!name.value.trim()||cost.value===''){throw new Error('Zakup wymaga nazwy i kosztu.')}payload={action_type:'PURCHASE',item_id:'',name:name.value.trim(),sourcing_type:source.value.trim()||null,purchase_cost:cost.value,delivery_cost:delivery.value||0,total_capital:(Number(cost.value)+Number(delivery.value||0)).toFixed(2),occurred_on:date.value||null,note:note.value.trim()||null,external_key:crypto.randomUUID()}}else{payload={action_type:k,item_id:x.item_id,occurred_on:date.value||null,amount:amount||null,note:note.value.trim()||null,external_key:crypto.randomUUID()};if(k==='LISTED')Object.assign(payload,{vinted_item_id:vinted.value.trim(),listing_url:url.value.trim()||null,live_title:title.value.trim()||null})}const{error}=await sb.rpc('apply_hq_ledger_action_owner',{p:payload});if(error)throw error;result.className='ok';result.textContent='Zapisano.';toast('Akcja zapisana');setTimeout(()=>location.href='ledger.html',500)}catch(e){result.className='bad';result.textContent=e.message||e}finally{save.disabled=false}}if(await shell('actions.html')){app.hidden=false;try{items=(await data()).items;item.innerHTML='<option value="">Wybierz DEN</option>'+items.filter(x=>x.ledger_status!=='SOLD').map(x=>`<option value="${safe(x.item_id)}">${safe(x.item_id)} · ${safe(itemTitle(x))}</option>`).join('');item.value=new URLSearchParams(location.search).get('item')||'';date.value=new Date().toISOString().slice(0,10);kind.onchange=render;item.onchange=render;save.onclick=saveAction;render()}catch(e){app.innerHTML=`<div class="notice">Nie udało się uruchomić Akcji: ${safe(e.message||e)}</div>`}}</script></html>
