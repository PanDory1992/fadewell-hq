<!doctype html>
<html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Action Studio</title>
<style>body{margin:0;background:#101010;color:#eee;font:15px system-ui}main{max-width:800px;margin:auto;padding:30px}.card{background:#1b1b1b;border:1px solid #333;border-radius:10px;padding:18px}a,button{background:#e7d4ae;color:#151515;border:0;border-radius:6px;padding:9px;text-decoration:none;font-weight:700;cursor:pointer}input,select,textarea{display:block;width:100%;box-sizing:border-box;background:#151515;color:#eee;border:1px solid #555;border-radius:6px;padding:10px;margin:8px 0}.muted{color:#aaa}.purchase,.listed-only{display:none}.result{min-height:22px}.error{color:#f2aa83}.success{color:#9ed38e}</style>
<main><h1>Action Studio</h1><p><a href="/">HQ Home</a> <a href="/ledger">Ledger</a> <a href="/operations">Operations</a></p><section class="card"><p class="muted">Canonical HQ. Vinted i Google pozostają nietknięte.</p><select id="type" onchange="toggle()"><option value="LISTED">Wystawienie</option><option value="SALE">Sprzedaż</option><option value="ADJUSTMENT">Korekta</option><option value="PURCHASE">Nowy zakup</option></select><select id="item"></select><div id="purchase" class="purchase"><p class="muted">DEN ID zostanie nadany automatycznie.</p><input id="name" placeholder="Nazwa itemu"><input id="source" placeholder="Sourcing type"><input id="tier" placeholder="Tier"><input id="purchaseCost" type="number" step="0.01" placeholder="Koszt zakupu"><input id="deliveryCost" type="number" step="0.01" placeholder="Dostawa"></div><input id="date" type="date"><input id="amount" type="number" step="0.01" placeholder="Cena listy PLN"><p id="profitHint" class="muted" hidden></p><div id="listed" class="listed-only"><input id="vinted" placeholder="Vinted Item ID"><input id="url" placeholder="Vinted URL"><input id="title" placeholder="Live title"></div><textarea id="note" placeholder="Notatka / dowód — opcjonalnie"></textarea><button id="save" onclick="save()">Zapisz akcję</button><p id="message" class="result muted"></p></section></main>
<script>
const $=x=>document.getElementById(x);let ledger=[];const money=x=>new Intl.NumberFormat('pl-PL',{style:'currency',currency:'PLN'}).format(x||0);
function toggle(){const kind=type.value,isPurchase=kind==='PURCHASE',isSale=kind==='SALE',isListed=kind==='LISTED';purchase.style.display=isPurchase?'block':'none';item.style.display=isPurchase?'none':'block';listed.style.display=isListed?'block':'none';amount.placeholder=isSale?'Cena sprzedaży PLN':isListed?'Cena listy PLN':'Kwota korekty PLN';profitHint.hidden=!isSale;showProfit()}
function showProfit(){if(type.value!=='SALE')return;const row=ledger.find(x=>x.Item_ID===item.value),price=Number(amount.value);const capital=Number(row?.Total_Capital);profitHint.textContent=Number.isFinite(price)&&Number.isFinite(capital)?`Zysk netto policzy się automatycznie: ${money(price-capital)} (cena sprzedaży − kapitał ${money(capital)}).`:'Wpisz cenę sprzedaży — zysk netto policzy się automatycznie z kapitału itemu.'}
async function save(){message.className='result muted';message.textContent='Zapisywanie…';save.disabled=true;const p={action_type:type.value,item_id:type.value==='PURCHASE'?'':item.value,occurred_on:date.value,amount:amount.value,vinted_item_id:vinted.value,listing_url:url.value,live_title:title.value,note:note.value};if(type.value==='PURCHASE'){p.name=name.value;p.sourcing_type=source.value;p.flip_tier=tier.value;p.purchase_cost=purchaseCost.value;p.delivery_cost=deliveryCost.value;p.total_capital=((+p.purchase_cost||0)+(+p.delivery_cost||0)).toFixed(2)}try{const r=await fetch('/api/ledger-actions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});const raw=await r.text();let d;try{d=JSON.parse(raw)}catch{d={error:raw.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim()}}if(!r.ok)throw new Error(d.error||d.message||'Nie udało się zapisać akcji.');message.className='result success';message.textContent=`Zapisano ${d.item_id}.`;setTimeout(()=>location.href='/ledger',650)}catch(error){message.className='result error';message.textContent=error.message||'Nie udało się zapisać akcji.'}finally{save.disabled=false}}
fetch('/api/ledger-stage').then(r=>r.json()).then(d=>{ledger=d.items;item.innerHTML='<option value="">Wybierz item</option>'+ledger.filter(x=>x.Status!=='SOLD').map(x=>`<option value="${x.Item_ID}">${x.Item_ID} · ${x.Name_Zakupy}</option>`).join('');const q=new URLSearchParams(location.search);if(q.get('item'))item.value=q.get('item');if(q.get('action'))type.value=q.get('action');date.value=new Date().toISOString().slice(0,10);toggle();showProfit()});item.onchange=showProfit;amount.oninput=showProfit;
</script></html>
