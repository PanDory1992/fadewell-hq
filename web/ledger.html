<!doctype html>
<html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HQ Ledger</title><link rel="stylesheet" href="hq.css">
<style>.table-wrap{overflow-x:auto}.ledger-table{min-width:1140px}.ledger-table .date-cell{white-space:nowrap}.timeline{position:relative;display:grid;gap:10px;margin-top:10px}.timeline:before{content:"";position:absolute;top:14px;bottom:14px;left:7px;width:1px;background:var(--line)}.timeline-item{position:relative;padding-left:25px}.timeline-dot{position:absolute;left:2px;top:7px;width:11px;height:11px;border-radius:50%;background:var(--blue);border:2px solid var(--panel)}.timeline-item.decision .timeline-dot{background:var(--cream)}.timeline-item.fact .timeline-dot{background:var(--green)}.timeline-item.review .timeline-dot{background:var(--red)}.timeline-item.historical .timeline-dot{background:var(--muted)}.timeline-card{padding:11px;border:1px solid var(--line);border-radius:10px;background:#161815}.timeline-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}.timeline-source{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 6px}.timeline-kind{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--cream)}.timeline-proof{display:flex;gap:8px;flex-wrap:wrap;margin-top:7px}.timeline-proof a,.timeline-proof span{font-size:12px;color:var(--cream);font-weight:700}@media(max-width:780px){.ledger-table{min-width:880px}}</style>
<main>
<header class="top"><div><div class="eyebrow">FADEWELL HQ</div><h1>Ledger</h1><p class="muted">Kapitał, cena live, estymata, wynik sprzedaży i historia każdego itemu.</p></div><span class="badge">Canonical DEN</span></header>
<nav id="nav"></nav><div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div>
<section id="app" hidden><section id="summary" class="grid"></section><div class="section-title"><h2>Wszystkie itemy</h2><span id="count" class="muted small"></span></div><div class="toolbar"><input id="query" placeholder="Szukaj ID, nazwy, marki, DNA…"><select id="filter"><option value="">Wszystkie statusy</option><option value="LISTED-BACKLOG">Wystawione</option><option value="UNLISTED-BACKLOG">Do wystawienia</option><option value="SOLD">Sprzedane</option></select><select id="sort" aria-label="Sortowanie Ledgeru"><option value="activity">Ostatnia aktywność</option><option value="profit">Zysk netto</option><option value="capital">Kapitał</option><option value="price">Cena</option><option value="stockDays">Dni w stocku</option><option value="liveDays">Dni live</option></select></div><article class="card table-wrap"><table class="ledger-table"><thead><tr><th>Item</th><th>Status</th><th>Kapitał</th><th>Cena</th><th>Dni w stocku</th><th>Dni live</th><th>Zysk netto</th><th>Ostatnia data</th><th></th></tr></thead><tbody id="rows"></tbody></table></article></section>
<dialog id="detail"><div id="detailBody"></div></dialog></main>
<script type="module">
import{shell,data,$,safe,money,sb,statusClass,statusLabel,itemPhoto,date,dateTime,itemTitle}from'./hq.js?v=20260714b';
import{buildTimeline}from'./timeline.js';
let all=[],snapshots=[];const value=n=>Number(n)||0;
const salePrice=item=>item.sale_price_arbitrage??item.sale_price_recycled??null;
const realisedProfit=item=>item.net_profit??(item.ledger_status==='SOLD'&&salePrice(item)!==null?value(salePrice(item))-value(item.total_capital):null);
const dates=item=>item.ledger_status==='SOLD'?`Sprzedano<br><b>${safe(date(item.sold_on))}</b>`:item.listed_on?`Wystawiono<br><b>${safe(date(item.listed_on))}</b>`:`Kupiono<br><b>${safe(date(item.purchased_on))}</b>`;
const lastBusinessDate=item=>item.sold_on||item.listed_on||item.purchased_on||'';
const daysSince=value=>value?Math.max(0,Math.floor((Date.now()-new Date(value).getTime())/86400000)):null;
const stockDays=item=>daysSince(item.purchased_on);
const liveDays=item=>item.ledger_status==='SOLD'?null:daysSince(item.listed_on);
const dnaSummary=item=>{const facts=item.item_dna?.facts||{},keys=['brand','model','tagged_size','fit','era','origin','wash','condition'];const visible=keys.filter(key=>facts[key]).map(key=>`${key}: ${facts[key]}`);return visible.length?visible.join(' · '):'Brak potwierdzonych faktów';};
function render(){const q=query.value.toLowerCase().trim(),f=filter.value,haystack=item=>`${item.item_id} ${item.name||''} ${item.live_title||''} ${Object.values(item.item_dna?.facts||{}).join(' ')}`.toLowerCase(),metric=item=>{const key=$('sort').value;if(key==='profit')return realisedProfit(item);if(key==='capital')return value(item.total_capital);if(key==='price')return item.ledger_status==='SOLD'?salePrice(item):item.live_list_price;if(key==='stockDays')return stockDays(item);if(key==='liveDays')return liveDays(item);return lastBusinessDate(item)?new Date(lastBusinessDate(item)).getTime():-Infinity;},view=all.filter(item=>(!q||haystack(item).includes(q))&&(!f||item.ledger_status===f)).sort((a,b)=>(metric(b)??-Infinity)-(metric(a)??-Infinity)||String(a.item_id).localeCompare(String(b.item_id)));count.textContent=`${view.length} z ${all.length} itemów`;rows.innerHTML=view.map(item=>{const photo=itemPhoto(item,snapshots),sold=item.ledger_status==='SOLD',price=sold?salePrice(item):item.live_list_price,daysInStock=stockDays(item);return`<tr data-stock-days="${daysInStock??''}" data-stock-days-unknown="${daysInStock===null?'true':'false'}"><td class="item-name"><div class="item-line">${photo?`<img src="${safe(photo)}" alt="">`:''}<div><b>${safe(item.item_id)}</b><br><span class="muted">${safe(itemTitle(item))}</span></div></div></td><td><span class="status ${statusClass(item.ledger_status)}">${safe(statusLabel(item.ledger_status))}</span></td><td>${money(item.total_capital)}</td><td>${money(price)}</td><td>${daysInStock??'—'}</td><td>${liveDays(item)??'—'}</td><td>${sold?money(realisedProfit(item)):'—'}</td><td class="date-cell small">${dates(item)}</td><td><button class="secondary" data-item="${safe(item.item_id)}">Szczegóły</button></td></tr>`}).join('')||'<tr><td colspan="9" class="empty">Brak wyników.</td></tr>';rows.querySelectorAll('button[data-item]').forEach(button=>button.onclick=()=>openItem(button.dataset.item));}
const timelineCard=entry=>{const kind=entry.type==='decision'?'decyzja':entry.type==='observation'?'obserwacja':entry.type==='historical'?'historia':entry.type==='review'?'przegląd':'fakt',timestamp=entry.precision==='date'?`${date(entry.at)} · godzina nieznana`:dateTime(entry.at),proof=entry.evidence.map(row=>row.href?`<a target="_blank" rel="noreferrer" href="${safe(row.href)}">${safe(row.label)}</a>`:`<span>${safe(row.label)}</span>`).join('');return`<article class="timeline-item ${safe(entry.type)}"><span class="timeline-dot"></span><div class="timeline-card"><b>${safe(entry.title)}</b><div class="timeline-meta"><span class="timeline-kind">${safe(kind)}</span><span class="timeline-source">${safe(entry.source.label)}</span><span class="muted small">${safe(timestamp)}</span></div><p class="muted small">${safe(entry.summary)}</p><div class="timeline-proof">${proof}</div></div></article>`;};
async function openItem(id){const item=all.find(row=>row.item_id===id),photo=itemPhoto(item,snapshots),vintedId=item.vinted_item_id?String(item.vinted_item_id):null;detailBody.innerHTML='<p class="muted">Ładowanie osi prawdy…</p>';detail.showModal();const [eventsResult,snapshotResult,gmailResult]=await Promise.all([sb.from('hq_ledger_events').select('*').eq('item_id',id).order('created_at',{ascending:false}),vintedId?sb.from('hq_listing_snapshots').select('*').eq('vinted_item_id',vintedId).order('captured_at',{ascending:true}).limit(1000):Promise.resolve({data:[],error:null}),sb.from('hq_external_events').select('*').eq('matched_item_id',id).order('created_at',{ascending:false})]);const errors=[eventsResult.error,snapshotResult.error,gmailResult.error].filter(Boolean),timeline=buildTimeline({item,ledgerEvents:eventsResult.data||[],snapshots:snapshotResult.data||[],externalEvents:gmailResult.data||[]}),warning=errors.length?`<p class="notice small">Część źródeł osi jest niedostępna: ${safe(errors.map(error=>error.message).join(' · '))}</p>`:'',timelineHtml=timeline.length?`<div class="timeline">${timeline.map(timelineCard).join('')}</div>`:'<p class="empty">Brak zdarzeń i obserwacji dla tego DEN.</p>';detailBody.innerHTML=`<div class="modal-top"><div><div class="eyebrow">${safe(item.item_id)}</div><h2>${safe(itemTitle(item))}</h2></div><button class="secondary" onclick="detail.close()">Zamknij</button></div><p class="row-actions"><a class="button" href="actions.html?item=${encodeURIComponent(id)}">Dodaj akcję</a><a class="button secondary" href="item-dna.html?item=${encodeURIComponent(id)}">Edytuj DNA</a>${item.listing_url?`<a class="button secondary" target="_blank" rel="noreferrer" href="${safe(item.listing_url)}">Otwórz Vinted</a>`:''}</p><div class="two-col"><div class="detail-grid"><div><span class="muted small">Status</span><br><b>${safe(statusLabel(item.ledger_status))}</b></div><div><span class="muted small">Item DNA</span><br><b>${safe(dnaSummary(item))}</b></div><div><span class="muted small">Kapitał</span><br><b>${money(item.total_capital)}</b></div><div><span class="muted small">Cena listy</span><br><b>${money(item.live_list_price)}</b></div><div><span class="muted small">Estymata</span><br><b>${safe(item.estimate_range||money(item.estimate_sale_price))}</b></div><div><span class="muted small">Est. zysk</span><br><b>${money(item.estimate_net_profit)}</b></div><div><span class="muted small">Cena sprzedaży</span><br><b>${money(salePrice(item))}</b></div><div><span class="muted small">Zysk netto</span><br><b>${money(realisedProfit(item))}</b></div><div><span class="muted small">Zakup</span><br><b>${safe(date(item.purchased_on))}</b></div><div><span class="muted small">Wystawienie</span><br><b>${safe(date(item.listed_on))}</b></div><div><span class="muted small">Sprzedaż</span><br><b>${safe(date(item.sold_on))}</b></div><div><span class="muted small">Vinted ID</span><br><b>${safe(item.vinted_item_id||'—')}</b></div></div>${photo?`<img class="photo large" src="${safe(photo)}" alt="">`:''}</div><div class="section-title"><div><h3>Truth timeline</h3><p class="muted small">Fakty, obserwacje i decyzje — z dowodem przy każdym wpisie.</p></div></div>${warning}${timelineHtml}`;}
if(await shell('ledger.html')){app.hidden=false;try{const d=await data();all=d.items;snapshots=d.snapshots;summary.innerHTML=[['Wystawione',all.filter(i=>i.ledger_status==='LISTED-BACKLOG').length],['Do wystawienia',all.filter(i=>i.ledger_status==='UNLISTED-BACKLOG').length],['Sprzedane',all.filter(i=>i.ledger_status==='SOLD').length],['Kapitał w stocku',money(all.filter(i=>i.ledger_status!=='SOLD').reduce((sum,i)=>sum+value(i.total_capital),0))]].map(([label,value])=>`<article class="card metric"><div class="n">${safe(value)}</div><div class="label">${safe(label)}</div></article>`).join('');render();query.oninput=render;filter.onchange=render;$('sort').onchange=render;const requested=new URLSearchParams(location.search).get('item');if(requested&&all.some(item=>item.item_id===requested))openItem(requested);}catch(error){app.innerHTML=`<div class="notice">Nie udało się wczytać Ledgeru: ${safe(error.message||error)}</div>`;}}
</script><script>const ledgerParams=new URLSearchParams(location.search);setTimeout(()=>{const focus=ledgerParams.get('focus'),status=ledgerParams.get('status');if(focus==='search')document.getElementById('query')?.focus();if(status){const f=document.getElementById('filter');if(f){f.value=status==='Wystawione'?'LISTED-BACKLOG':status==='Do wystawienia'?'UNLISTED-BACKLOG':status==='Sprzedane'?'SOLD':'';f.dispatchEvent(new Event('change'))}}},300);document.addEventListener('click',e=>{const row=e.target.closest('#rows tr');if(row&&!e.target.closest('button,a,input,select'))row.querySelector('button[data-item]')?.click()})</script></html>
