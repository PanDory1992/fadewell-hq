<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HQ Ledger</title><link rel="stylesheet" href="hq.css"><main><h1>HQ Ledger</h1><nav id="nav"></nav><button id="login">Zaloguj przez GitHub</button> <button id="logout" hidden>Wyloguj</button><p id="status" class="muted"></p><section id="app" hidden><section id="summary" class="grid"></section><p><input id="query" placeholder="Szukaj ID lub nazwy"><select id="filter"><option value="">Wszystkie statusy</option><option>LISTED-BACKLOG</option><option>UNLISTED-BACKLOG</option><option>SOLD</option></select></p><table><thead><tr><th>Item</th><th>Status</th><th class="hide-small">Tier</th><th>Kapitał</th><th>Live</th><th></th></tr></thead><tbody id="rows"></tbody></table></section></main><dialog id="detail"><button onclick="detail.close()">Zamknij</button><div id="detailBody"></div></dialog><script type="module">import{shell,data,$,safe,money,sb}from'./hq.js';let all=[];function render(){const q=query.value.toLowerCase(),f=filter.value;rows.innerHTML=all.filter(i=>(!q||`${i.item_id} ${i.name}`.toLowerCase().includes(q))&&(!f||i.ledger_status===f)).map(i=>`<tr><td class="item-name"><b>${safe(i.item_id)}</b><br><span class="muted">${safe(i.name||'')}</span></td><td>${safe(i.ledger_status)}</td><td class="hide-small">${safe(i.flip_tier||'—')}</td><td>${money(i.total_capital)}</td><td>${i.listing_url?`<a target="_blank" href="${safe(i.listing_url)}">Vinted</a>`:'—'}<br>${money(i.live_list_price)}</td><td><button onclick="window.openItem('${safe(i.item_id)}')">Szczegóły</button></td></tr>`).join('')||'<tr><td colspan="6" class="muted">Brak wyników.</td></tr>'}window.openItem=async id=>{const i=all.find(x=>x.item_id===id);const{data:events}=await sb.from('hq_ledger_events').select('*').eq('item_id',id).order('created_at',{ascending:false});detailBody.innerHTML=`<h2>${safe(i.item_id)} · ${safe(i.name||'')}</h2><p><a href="actions.html?item=${encodeURIComponent(id)}">Dodaj akcję</a> ${i.listing_url?`<a target="_blank" href="${safe(i.listing_url)}">Otwórz Vinted</a>`:''}</p><div class="card">Kapitał: ${money(i.total_capital)}<br>Estymata: ${safe(i.estimate_range||money(i.estimate_sale_price))}<br>Est. zysk: ${money(i.estimate_net_profit)}<br>Vinted ID: ${safe(i.vinted_item_id||'—')}<br>Dowód estymaty: ${safe(i.estimate_evidence||'—')}</div><h3>Historia księgowa</h3><ul>${events?.map(e=>`<li><b>${safe(e.event_type)}</b> · ${safe(e.occurred_on||e.created_at)} · ${money(e.amount)}<br><span class="muted">${safe(e.detail||'')}</span></li>`).join('')||'<li class="muted">Brak zdarzeń.</li>'}</ul>`;detail.showModal()};if(await shell('ledger.html')){app.hidden=false;const d=await data();all=d.items;summary.innerHTML=[['Listed',all.filter(i=>i.ledger_status==='LISTED-BACKLOG').length],['Unlisted',all.filter(i=>i.ledger_status==='UNLISTED-BACKLOG').length],['Sold',all.filter(i=>i.ledger_status==='SOLD').length],['Kapitał',money(all.filter(i=>i.ledger_status!=='SOLD').reduce((a,i)=>a+(+i.total_capital||0),0))]].map(([k,v])=>`<div class="card"><div class="n">${v}</div><div class="muted">${k}</div></div>`).join('');render();query.oninput=render;filter.oninput=render}</script></html>
