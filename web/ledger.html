<!doctype html>
<html lang="pl">
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HQ Ledger</title>
<style>
body{margin:0;background:#101010;color:#f5f0e8;font:14px system-ui}main{max-width:1500px;margin:auto;padding:28px}.muted{color:#aaa}nav{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}a,button{color:#151515;background:#e7d4ae;border:0;border-radius:6px;padding:7px;text-decoration:none;cursor:pointer;font-weight:650}input,select{background:#1b1b1b;color:#eee;border:1px solid #555;border-radius:6px;padding:8px;margin-right:8px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{background:#1b1b1b;border:1px solid #333;border-radius:10px;padding:14px}.n{font-size:28px;font-weight:700}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{padding:9px;border-bottom:1px solid #333;text-align:left;vertical-align:top}.text{max-width:390px}dialog{background:#1b1b1b;color:#eee;border:1px solid #555;border-radius:10px;max-width:820px;width:90%;padding:20px}dialog::backdrop{background:#000a}.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.detail-grid div{border-bottom:1px solid #333;padding:7px 0}.history{margin-top:18px}.history li{margin:8px 0}@media(max-width:700px){main{padding:18px}.grid{grid-template-columns:repeat(2,1fr)}.detail-grid{grid-template-columns:1fr}table{font-size:12px}.hide-small{display:none}}
</style>
<main>
  <h1>HQ Ledger</h1>
  <nav><a href="/">HQ Home</a><a href="/actions">Action Studio</a><a href="/operations">Operations</a><a href="/readiness">System health</a></nav>
  <p id="state" class="muted"></p><section id="summary" class="grid"></section>
  <p><input id="query" placeholder="Szukaj ID lub nazwy"><select id="status"><option value="">Wszystkie statusy</option><option>LISTED-BACKLOG</option><option>UNLISTED-BACKLOG</option><option>SOLD</option></select></p>
  <table><thead><tr><th>Item</th><th>Status</th><th class="hide-small">Tier</th><th>Kapitał</th><th>Live</th><th class="hide-small">Daty</th></tr></thead><tbody id="rows"></tbody></table>
</main>
<dialog id="detail"><button onclick="detail.close()">Zamknij</button><div id="detailBody"></div></dialog>
<script>
let all=[];const $=x=>document.getElementById(x);const safe=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const money=x=>x===null||x===undefined||x===''?'—':`${Number(x).toFixed(2)} PLN`;
function render(){const q=$('query').value.toLowerCase(),s=$('status').value;const data=all.filter(x=>(!q||`${x.Item_ID} ${x.Name_Zakupy}`.toLowerCase().includes(q))&&(!s||x.Status===s));$('rows').innerHTML=data.map(x=>`<tr><td class="text"><b>${safe(x.Item_ID)}</b><br><span class="muted">${safe(x.Name_Zakupy||'')}</span><p><button onclick="openDetail('${safe(x.Item_ID)}')">Szczegóły</button> <a href="/actions?item=${encodeURIComponent(x.Item_ID)}">Akcje</a> ${x.Status!=='SOLD'?`<a href="/actions?item=${encodeURIComponent(x.Item_ID)}&action=SALE">Sprzedaj</a>`:''}</p></td><td>${safe(x.Status)}</td><td class="hide-small">${safe(x.Flip_Tier||'—')}</td><td>${money(x.Total_Capital)}</td><td>${x.Listing_URL?`<a href="${safe(x.Listing_URL)}" target="_blank" rel="noreferrer">Vinted</a>`:'—'}<br>${money(x.Live_List_Price)}</td><td class="hide-small">${safe(x.DATE_OF_PURCHASE||'—')}<br>${safe(x.DATE_OF_LISTING||'')}<br>${safe(x.DATE_OF_SALE||'')}</td></tr>`).join('')||'<tr><td colspan="6" class="muted">Brak wyników.</td></tr>'}
async function openDetail(id){const d=await fetch(`/api/ledger-item/${encodeURIComponent(id)}`).then(r=>r.json());const item=d.item;const fields=[['Kapitał',money(item.Total_Capital)],['Estymata',item.Est_Sale_Range||money(item.Est_Sale_Price)],['Est. zysk',money(item.Est_Net_Profit)],['Vinted ID',item.Vinted_Item_ID||'—'],['Źródło',item.Sourcing_Type||'—'],['Era',item.Curation_Era||'—'],['Dowód estymaty',item.Est_Evidence||'—'],['Live title',item.Live_Title||'—']];const events=d.events?.map(e=>`<li><b>${safe(e.event_type)}</b> · ${safe(e.occurred_on||e.created_at)}${e.amount!==null?` · ${money(e.amount)}`:''}<br><span class="muted">${safe(e.detail||e.source||'')}</span></li>`).join('')||'<li class="muted">Brak zapisanych zdarzeń.</li>';const snaps=d.snapshots?.slice(0,8).map(s=>`<li>${safe(s.captured_at)} · ${money(s.price_pln)} · ${safe(s.views||0)} views / ${safe(s.favourites||0)} likes</li>`).join('')||'<li class="muted">Brak lokalnych obserwacji live.</li>';$('detailBody').innerHTML=`<h2>${safe(item.Item_ID)} · ${safe(item.Name_Zakupy||'')}</h2><p><a href="/actions?item=${encodeURIComponent(item.Item_ID)}">Dodaj akcję</a> ${item.Listing_URL?`<a href="${safe(item.Listing_URL)}" target="_blank" rel="noreferrer">Otwórz Vinted</a>`:''}</p><section class="detail-grid">${fields.map(([k,v])=>`<div><span class="muted">${safe(k)}</span><br>${safe(v)}</div>`).join('')}</section><section class="history"><h3>Historia księgowa</h3><ul>${events}</ul><h3>Ostatnie obserwacje Vinted</h3><ul>${snaps}</ul></section>`;$('detail').showModal()}
fetch('/api/ledger-stage').then(r=>r.json()).then(d=>{all=d.items;$('state').textContent=`Canonical HQ · ${all.length} itemów`;const capital=all.filter(x=>x.Status!=='SOLD').reduce((a,x)=>a+(+x.Total_Capital||0),0);$('summary').innerHTML=[['Listed',all.filter(x=>x.Status==='LISTED-BACKLOG').length],['Unlisted',all.filter(x=>x.Status==='UNLISTED-BACKLOG').length],['Sold',all.filter(x=>x.Status==='SOLD').length],['Kapitał',money(capital)]].map(x=>`<div class="card"><div class="n">${x[1]}</div><div class="muted">${x[0]}</div></div>`).join('');render()});$('query').oninput=render;$('status').oninput=render;
</script>
</html>
