<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HQ Ledger</title><link rel="stylesheet" href="hq.css"><main>
<header class="top"><div><div class="eyebrow">FADEWELL HQ</div><h1>Ledger</h1><p class="muted">Pełny widok kapitału, statusów, estymat i zdarzeń itemu.</p></div><span class="badge">Prototyp równoległy</span></header><nav id="nav"></nav><div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div>
<section id="app" hidden><section id="summary" class="grid"></section><div class="section-title"><h2>Wszystkie itemy</h2><span id="count" class="muted small"></span></div><div class="toolbar"><input id="query" placeholder="Szukaj ID, nazwy, marki…"><select id="filter"><option value="">Wszystkie statusy</option><option value="LISTED-BACKLOG">Wystawione</option><option value="UNLISTED-BACKLOG">Do wystawienia</option><option value="SOLD">Sprzedane</option></select></div><article class="card"><table><thead><tr><th>Item</th><th>Status</th><th class="hide-small">Tier</th><th>Kapitał</th><th class="hide-small">Estymata</th><th>Live</th><th></th></tr></thead><tbody id="rows"></tbody></table></article></section>
<dialog id="detail"><div id="detailBody"></div></dialog></main><script type="module">import{shell,data,$,safe,money,sb,statusClass,statusLabel,itemPhoto,date}from'./hq.js';let all=[],snapshots=[];function render(){const q=query.value.toLowerCase().trim(),f=filter.value,view=all.filter(item=>(!q||`${item.item_id} ${item.name||''} ${item.brand||''}`.toLowerCase().includes(q))&&(!f||item.ledger_status===f));count.textContent=`${view.length} z ${all.length} itemów`;rows.innerHTML=view.map(item=>{const photo=itemPhoto(item,snapshots);return`<tr><td class="item-name"><div class="item-line">${photo?`<img src="${safe(photo)}" alt="">`:''}<div><b>${safe(item.item_id)}</b><br><span class="muted">${safe(item.name||'Bez nazwy')}</span></div></div></td><td><span class="status ${statusClass(item.ledger_status)}">${safe(statusLabel(item.ledger_status))}</span></td><td class="hide-small">${safe(item.flip_tier||'—')}</td><td>${money(item.total_capital)}</td><td class="hide-small">${safe(item.estimate_range||money(item.estimate_sale_price))}</td><td>${item.listing_url?`<a class="text-link" target="_blank" rel="noreferrer" href="${safe(item.listing_url)}">Vinted</a><br>`:'—'}<span class="small">${money(item.live_list_price)}</span></td><td><button class="secondary" data-item="${safe(item.item_id)}">Szczegóły</button></td></tr>`}).join('')||'<tr><td colspan="7" class="empty">Brak wyników.</td></tr>';rows.querySelectorAll('button[data-item]').forEach(button=>button.onclick=()=>openItem(button.dataset.item));}async function openItem(id){const item=all.find(row=>row.item_id===id);const{data:events,error}=await sb.from('hq_ledger_events').select('*').eq('item_id',id).order('created_at',{ascending:false});const photo=itemPhoto(item,snapshots);detailBody.innerHTML=`<div class="modal-top"><div><div class="eyebrow">${safe(item.item_id)}</div><h2>${safe(item.name||'Bez nazwy')}</h2></div><button class="secondary" onclick="detail.close()">Zamknij</button></div><p class="row-actions"><a class="button" href="actions.html?item=${encodeURIComponent(id)}">Dodaj akcję</a>${item.listing_url?`<a class="button secondary" target="_blank" rel="noreferrer" href="${safe(item.listing_url)}">Otwórz Vinted</a>`:''}</p><div class="two-col"><div class="detail-grid"><div><span class="muted small">Kapitał</span><br><b>${money(item.total_capital)}</b></div><div><span class="muted small">Estymata</span><br><b>${safe(item.estimate_range||money(item.estimate_sale_price))}</b></div><div><span class="muted small">Est. zysk</span><br><b>${money(item.estimate_net_profit)}</b></div><div><span class="muted small">Vinted ID</span><br><b>${safe(item.vinted_item_id||'—')}</b></div><div><span class="muted small">Zakup</span><br><b>${safe(date(item.purchased_on))}</b></div><div><span class="muted small">Wystawienie</span><br><b>${safe(date(item.listed_on))}</b></div></div>${photo?`<img class="photo large" src="${safe(photo)}" alt="">`:''}</div><div class="section-title"><h3>Historia księgowa</h3></div><div class="feed">${error?`<p class="bad">Nie udało się pobrać historii: ${safe(error.message)}</p>`:(events||[]).map(event=>`<div class="feed-item"><b>${safe(event.event_type||'EVENT')}</b> · ${safe(date(event.occurred_on||event.created_at))} · ${money(event.amount)}<p class="muted small">${safe(event.detail||event.source||'')}</p></div>`).join('')||'<p class="empty">Brak zdarzeń.</p>'}</div>`;detail.showModal();}if(await shell('ledger.html')){app.hidden=false;try{const d=await data();all=d.items;snapshots=d.snapshots;summary.innerHTML=[['Wystawione',all.filter(i=>i.ledger_status==='LISTED-BACKLOG').length],['Do wystawienia',all.filter(i=>i.ledger_status==='UNLISTED-BACKLOG').length],['Sprzedane',all.filter(i=>i.ledger_status==='SOLD').length],['Kapitał w stocku',money(all.filter(i=>i.ledger_status!=='SOLD').reduce((sum,i)=>sum+(+i.total_capital||0),0))]].map(([label,value])=>`<article class="card metric"><div class="n">${safe(value)}</div><div class="label">${safe(label)}</div></article>`).join('');render();query.oninput=render;filter.onchange=render;}catch(error){app.innerHTML=`<div class="notice">Nie udało się wczytać Ledgeru: ${safe(error.message||error)}</div>`;}}</script></html>
