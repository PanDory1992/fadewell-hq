<!doctype html>
<html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FADEWELL HQ</title>
<style>:root{color-scheme:dark}body{margin:0;background:#101010;color:#f5f0e8;font:15px system-ui}main{max-width:1200px;margin:auto;padding:32px}.muted{color:#aaa}.card{background:#1b1b1b;border:1px solid #34312d;border-radius:12px;padding:16px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.split{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:16px}.n{font-size:32px;font-weight:700}button,select,input,textarea{border-radius:7px;padding:9px;font:inherit}button{border:0;background:#e7d4ae;color:#151515;font-weight:700;cursor:pointer}input,select,textarea{box-sizing:border-box;width:100%;background:#151515;color:#eee;border:1px solid #555;margin:5px 0}.action{display:none}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{padding:10px;border-bottom:1px solid #34312d;text-align:left;vertical-align:top}img{width:42px;height:56px;object-fit:cover;border-radius:4px}.ok{color:#9ed38e}.bad{color:#f2aa83}@media(max-width:700px){main{padding:18px}.grid,.split{grid-template-columns:1fr}}</style>
<main><h1>FADEWELL HQ</h1><p class="muted">Canonical DEN Ledger · Vinted read-only · prywatny dostęp przez GitHub</p><button id="login">Zaloguj przez GitHub</button> <button id="logout" hidden>Wyloguj</button><p id="status" class="muted"></p>
<section id="app" hidden><section id="summary" class="grid"></section><section class="split"><article class="card"><h2>Live wardrobe</h2><table id="live"></table></article><article class="card"><h2>Nowa akcja</h2><select id="kind"><option value="SALE">Sprzedaż</option><option value="LISTED">Wystawienie</option><option value="PURCHASE">Nowy zakup</option></select><select id="item"></select><div id="purchase" class="action"><p class="muted">DEN ID zostanie nadany automatycznie.</p><input id="name" placeholder="Nazwa itemu"><input id="source" placeholder="Sourcing type"><input id="tier" placeholder="Tier"><input id="cost" type="number" step="0.01" placeholder="Koszt zakupu"><input id="delivery" type="number" step="0.01" placeholder="Dostawa"></div><input id="date" type="date"><input id="amount" type="number" step="0.01" placeholder="Cena sprzedaży PLN"><p id="profit" class="muted"></p><div id="listed" class="action"><input id="vinted" placeholder="Vinted Item ID"><input id="url" placeholder="Vinted URL"><input id="title" placeholder="Live title"></div><textarea id="note" placeholder="Notatka — opcjonalnie"></textarea><button id="save">Zapisz akcję</button><p id="result" class="muted"></p></article></section><section class="card"><h2>Do weryfikacji</h2><div id="queue"></div></section></section></main>
<script type="module">
import {createClient} from 'https://esm.sh/@supabase/supabase-js@2';
const sb=createClient('https://qgjkxtolyhbwpvncwtkn.supabase.co','sb_publishable_4I4sJO02Tudp00ALX2xbaQ_DHptnBLb');const $=x=>document.getElementById(x),safe=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),money=x=>new Intl.NumberFormat('pl-PL',{style:'currency',currency:'PLN'}).format(x||0);let items=[];
$('login').onclick=async()=>{const {error}=await sb.auth.signInWithOAuth({provider:'github',options:{redirectTo:location.origin+location.pathname}});if(error)$('status').textContent=error.message};$('logout').onclick=()=>sb.auth.signOut();
function toggle(){const k=$('kind').value,p=k==='PURCHASE',l=k==='LISTED',s=k==='SALE';$('purchase').style.display=p?'block':'none';$('item').style.display=p?'none':'block';$('listed').style.display=l?'block':'none';$('amount').placeholder=s?'Cena sprzedaży PLN':l?'Cena listy PLN':'Kwota PLN';profit();}
function profit(){if($('kind').value!=='SALE'){ $('profit').textContent='';return }const row=items.find(x=>x.item_id===$('item').value),price=Number($('amount').value),capital=Number(row?.total_capital);$('profit').textContent=Number.isFinite(price)&&Number.isFinite(capital)?`Zysk netto policzy się automatycznie: ${money(price-capital)}.`:'Zysk netto policzy się automatycznie z ceny sprzedaży i kapitału.'}
async function load(){const {data:{session}}=await sb.auth.getSession();if(!session){$('status').textContent='Zaloguj się przez GitHub, aby wejść do HQ.';return}const {data:owner,error:oe}=await sb.rpc('claim_first_hq_owner');if(oe||!owner){$('status').textContent=oe?.message||'Brak owner access.';return}$('login').hidden=true;$('logout').hidden=false;$('app').hidden=false;$('status').textContent=session.user.email||'HQ owner';const [{data:ledger,error:le},{data:snaps,error:se},{data:reviews,error:re}]=await Promise.all([sb.from('hq_ledger_items').select('*'),sb.from('hq_listing_snapshots').select('*').order('captured_at',{ascending:false}).limit(500),sb.from('hq_review_queue').select('*').eq('state','OPEN').order('created_at',{ascending:false})]);if(le||se||re){$('status').textContent=(le||se||re).message;return}items=ledger;const latest=new Map;snaps.forEach(s=>{const id=String(s.vinted_item_id||'');if(id&&!latest.has(id))latest.set(id,s)});const linked=new Map(items.filter(x=>x.vinted_item_id).map(x=>[String(x.vinted_item_id),x]));$('summary').innerHTML=[['itemy DEN',items.length],['live',latest.size],['połączone',[...latest.keys()].filter(id=>linked.has(id)).length],['otwarte sprawy',reviews.length]].map(([k,v])=>`<div class="card"><div class="n">${v}</div><div class="muted">${k}</div></div>`).join('');$('item').innerHTML='<option value="">Wybierz item</option>'+items.filter(x=>x.ledger_status!=='SOLD').map(x=>`<option value="${safe(x.item_id)}">${safe(x.item_id)} · ${safe(x.name||'')}</option>`).join('');$('live').innerHTML='<tr><th>Item</th><th>Cena</th><th>Views / likes</th></tr>'+[...latest.values()].sort((a,b)=>(b.favourites||0)-(a.favourites||0)).slice(0,50).map(s=>{const i=linked.get(String(s.vinted_item_id));return `<tr><td><b>${safe(i?.item_id||'UNLINKED')}</b><br><span class="muted">${safe(s.title)}</span></td><td>${safe(s.price_pln||'-')} PLN</td><td>${safe(s.views||0)} / ${safe(s.favourites||0)}</td></tr>`}).join('');$('queue').innerHTML=reviews.length?reviews.map(r=>`<p><b>${safe(r.kind)}</b> · ${safe(r.item_id||r.vinted_item_id)}<br><span class="muted">${safe(r.detail)}</span></p>`).join(''):'<p class="ok">✓ Inbox czysty</p>';toggle()}
async function save(){const k=$('kind').value,p={action_type:k,item_id:k==='PURCHASE'?'':$('item').value,occurred_on:$('date').value,amount:$('amount').value,note:$('note').value,external_key:crypto.randomUUID()};if(k==='PURCHASE'){p.name=$('name').value;p.sourcing_type=$('source').value;p.flip_tier=$('tier').value;p.purchase_cost=$('cost').value;p.delivery_cost=$('delivery').value;p.total_capital=((+p.purchase_cost||0)+(+p.delivery_cost||0)).toFixed(2)}if(k==='LISTED'){p.vinted_item_id=$('vinted').value;p.listing_url=$('url').value;p.live_title=$('title').value}$('save').disabled=true;$('result').textContent='Zapisywanie…';const {data,error}=await sb.rpc('apply_hq_ledger_action_owner',{p});$('save').disabled=false;if(error){$('result').className='bad';$('result').textContent=error.message;return}$('result').className='ok';$('result').textContent='Zapisano w canonical HQ.';await load()}
$('kind').onchange=toggle;$('item').onchange=profit;$('amount').oninput=profit;$('save').onclick=save;$('date').value=new Date().toISOString().slice(0,10);sb.auth.onAuthStateChange(()=>setTimeout(load,0));load();
</script></html>
