<!doctype html>
<html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live wardrobe · HQ</title><link rel="stylesheet" href="hq.css">
<main>
  <header class="top"><div><div class="eyebrow">Vinted · read-only</div><h1>Live wardrobe</h1><p class="muted">Aktualne listingi, ich zdjęcia z URL-i Vinted oraz sygnały zainteresowania.</p></div><span class="badge">Live observations</span></header>
  <nav id="nav"></nav>
  <div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div>
  <section id="app" hidden><div class="toolbar"><input id="query" placeholder="Szukaj ID lub tytułu…"><select id="sort"><option value="newest">Najnowsze</option><option value="oldest">Najstarsze</option><option value="likes">Najwięcej likes</option><option value="price_desc">Najwyższa cena</option><option value="price_asc">Najniższa cena</option><option value="title">Tytuł A–Z</option></select><button id="refreshLive" class="secondary">Odśwież live wardrobe</button></div><p id="refreshStatus" class="muted small"></p><p id="count" class="muted small"></p><div id="items" class="live-grid"></div></section>
</main>
<script type="module">
import {shell,data,$,safe,money,dateTime,sb} from'./hq.js?v=20260719-title';
let listings=[],linked=new Map(),pending=new Set();
const numeric=value=>Number(value)||0;
function compare(sort,a,b){
  if(sort==='newest') return numeric(b.vinted_item_id)-numeric(a.vinted_item_id);
  if(sort==='oldest') return numeric(a.vinted_item_id)-numeric(b.vinted_item_id);
  if(sort==='likes') return numeric(b.favourites)-numeric(a.favourites);
  if(sort==='price_desc') return numeric(b.price_pln)-numeric(a.price_pln);
  if(sort==='price_asc') return numeric(a.price_pln)-numeric(b.price_pln);
  return String(a.title||'').localeCompare(String(b.title||''),'pl');
}
function render(){
  const q=query.value.toLowerCase().trim(),sort=sortSelect.value;
  const rows=listings.filter(row=>`${row.title||''} ${linked.get(String(row.vinted_item_id))?.item_id||''}`.toLowerCase().includes(q)).sort((a,b)=>compare(sort,a,b));
  count.textContent=`${rows.length} aktywnych listingów${pending.size?` · ${pending.size} czeka na drugi snapshot`:''}`;
  items.innerHTML=rows.map(row=>{const item=linked.get(String(row.vinted_item_id));return`<article class="card live-card">${row.photo_url?`<img class="photo" src="${safe(row.photo_url)}" alt="">`:'<div class="photo"></div>'}<div><h3>${safe(item?.item_id||'UNLINKED')}</h3><p class="muted small">${safe(row.title||'Bez tytułu')}</p><p><b>${money(row.price_pln)}</b></p><p class="muted small">${safe(row.favourites||0)} likes</p>${row.pending_confirmation?'<p class="notice small">Nie było go w ostatnim pullu — czekamy na drugi snapshot, aby nie zgadywać.</p>':''}${item?.listing_url?`<a class="text-link small" target="_blank" rel="noreferrer" href="${safe(item.listing_url)}">Otwórz na Vinted</a>`:''}</div></article>`}).join('')||'<p class="empty">Brak wyników.</p>';
}
const sortSelect=$('sort'),refreshButton=$('refreshLive');
let latestSnapshot='';let refreshTimer;
async function load(){const d=await data();listings=d.snapshots;linked=d.linked;pending=new Set(d.pendingConfirmation);latestSnapshot=d.latestCapturedAt||latestSnapshot;render();return d;}
async function requestLiveRefresh(){refreshButton.disabled=true;refreshStatus.textContent='Uruchamiam collector…';const {data:result,error}=await sb.functions.invoke('hq-vinted-refresh');if(error){refreshButton.disabled=false;refreshStatus.textContent=`Nie uruchomiono: ${error.message||'nieznany błąd'}.`;return;}if(result?.status==='already_running'){refreshStatus.textContent='Collector już działa. Czekam na nowy kompletny snapshot…';}else if(result?.status==='started'){refreshStatus.textContent='Collector uruchomiony. Widok odświeży się po kompletnym snapshotcie…';}else{refreshButton.disabled=false;refreshStatus.textContent=`Nie uruchomiono: ${result?.error||'nieznany błąd'}.`;return;}const before=latestSnapshot,requestedAt=result.requested_at||new Date().toISOString(),started=Date.now();clearInterval(refreshTimer);refreshTimer=setInterval(async()=>{try{const d=await load();if(d.latestCapturedAt&&d.latestCapturedAt!==before){clearInterval(refreshTimer);refreshButton.disabled=false;refreshStatus.textContent=`Live wardrobe odświeżone: ${dateTime(d.latestCapturedAt)}.`;return;}const {data:run}=await sb.functions.invoke('hq-vinted-refresh',{body:{status_only:true,since:requestedAt}});if(run?.status==='completed'&&run?.conclusion!=='success'){clearInterval(refreshTimer);refreshButton.disabled=false;refreshStatus.innerHTML=`Collector zakończył się błędem; nie zapisano niepełnych danych.${run.run_url?` <a class="text-link" target="_blank" rel="noreferrer" href="${safe(run.run_url)}">Szczegóły</a>`:''}`;return;}if(Date.now()-started>12*60*1000){clearInterval(refreshTimer);refreshButton.disabled=false;refreshStatus.textContent='Collector nie zakończył się w 12 minut. Spróbuj ponownie lub sprawdź Operations.';}}catch{ /* Preserve the current view and continue polling the collector. */ }},10000);}
if(await shell('wardrobe.html')){app.hidden=false;try{await load();refreshStatus.textContent=latestSnapshot?`Ostatni kompletny snapshot: ${dateTime(latestSnapshot)}.`:'';query.oninput=render;sortSelect.onchange=render;refreshButton.onclick=requestLiveRefresh;}catch(error){app.innerHTML=`<div class="notice">Nie udało się wczytać wardrobe: ${safe(error.message||error)}</div>`;}}
</script><script>
document.addEventListener('click',event=>{const card=event.target.closest('#items .live-card');if(!card||event.target.closest('a,button,input,select'))return;const den=card.querySelector('h3')?.textContent.trim()||'';if(/^DEN-\d+$/.test(den))location.href=`ledger.html?item=${encodeURIComponent(den)}`;});
</script></html>
