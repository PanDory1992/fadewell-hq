<!doctype html>
<html lang="pl">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live wardrobe · HQ</title>
<link rel="stylesheet" href="hq.css">
<main>
  <header class="top"><div><div class="eyebrow">Vinted · read-only</div><h1>Live wardrobe</h1><p class="muted">Aktualne listingi, ich zdjęcia z URL-i Vinted oraz sygnały zainteresowania.</p></div><span class="badge">Prototyp równoległy</span></header>
  <nav id="nav"></nav>
  <div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div>
  <section id="app" hidden><div class="toolbar"><input id="query" placeholder="Szukaj ID lub tytułu…"><select id="sort"><option value="favourites">Najwięcej likes</option><option value="views">Najwięcej views</option><option value="price">Najwyższa cena</option></select></div><p id="count" class="muted small"></p><div id="items" class="live-grid"></div></section>
</main>
<script type="module">
import {shell,data,$,safe,money} from './hq.js';
let listings=[],linked=new Map(),pending=new Set();
function render(){
  const q=query.value.toLowerCase(),sort=sortSelect.value;
  const rows=listings.filter(row=>`${row.title||''} ${linked.get(String(row.vinted_item_id))?.item_id||''}`.toLowerCase().includes(q)).sort((a,b)=>(b[sort]||0)-(a[sort]||0));
  count.textContent=`${rows.length} aktywnych listingów${pending.size?` · ${pending.size} czeka na drugi snapshot`:''}`;
  items.innerHTML=rows.map(row=>{const item=linked.get(String(row.vinted_item_id));return`<article class="card live-card">${row.photo_url?`<img class="photo" src="${safe(row.photo_url)}" alt="">`:'<div class="photo"></div>'}<div><h3>${safe(item?.item_id||'UNLINKED')}</h3><p class="muted small">${safe(row.title||'Bez tytułu')}</p><p><b>${money(row.price_pln)}</b></p><p class="muted small">${safe(row.views||0)} views · ${safe(row.favourites||0)} likes</p>${row.pending_confirmation?'<p class="notice small">Nie było go w ostatnim pullu — czekamy na drugi snapshot, aby nie zgadywać.</p>':''}${item?.listing_url?`<a class="text-link small" target="_blank" rel="noreferrer" href="${safe(item.listing_url)}">Otwórz na Vinted</a>`:''}</div></article>`}).join('')||'<p class="empty">Brak wyników.</p>';
}
const sortSelect=$('sort');
if(await shell('wardrobe.html')){
  app.hidden=false;
  try{const d=await data();listings=d.snapshots;linked=d.linked;pending=new Set(d.pendingConfirmation);render();query.oninput=render;sortSelect.onchange=render;}catch(error){app.innerHTML=`<div class="notice">Nie udało się wczytać wardrobe: ${safe(error.message||error)}</div>`;}
}
</script>
</html>
