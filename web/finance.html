<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Finanse · FADEWELL HQ</title><link rel="stylesheet" href="hq.css"><main><header class="top"><div><div class="eyebrow">FADEWELL HQ · Finanse</div><h1>Kapitał, rotacja i ryzyko.</h1><p class="muted">Supabase / HQ jest jedyną prawdą dla DEN.</p></div><span class="badge">Canonical</span></header><nav id="nav"></nav><div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div><section id="app" hidden><article class="notice"><b>DEN canonical:</b> Google Sheet nie jest źródłem ani miejscem zapisu dla DEN; pozostaje tylko dla REC i historii.</article><section id="metrics" class="grid"></section><section class="split"><article class="card"><h2>Kapitał według wieku stocku</h2><div id="age" class="feed"></div></article><article class="card"><h2>Co to znaczy dziś</h2><div id="meaning" class="feed"></div></article></section></section></main><script type="module">import{shell,data,$,safe,money}from'./hq.js';const n=x=>Number(x)||0,days=x=>x?Math.max(0,Math.floor((Date.now()-new Date(x))/864e5)):null;if(await shell('finance.html')){app.hidden=false;try{const d=await data(),stock=d.items.filter(x=>x.ledger_status!=='SOLD'),unknown=stock.filter(x=>days(x.purchased_on)===null),b=[['0–30 dni',x=>{const a=days(x.purchased_on);return a!==null&&a<=30}],['31–60 dni',x=>{const a=days(x.purchased_on);return a!==null&&a>30&&a<=60}],['61–90 dni',x=>{const a=days(x.purchased_on);return a!==null&&a>60&&a<=90}],['90+ dni',x=>{const a=days(x.purchased_on);return a!==null&&a>90}],['Data zakupu nieznana',x=>days(x.purchased_on)===null]],total=stock.reduce((s,x)=>s+n(x.total_capital),0),old=stock.filter(x=>{const a=days(x.purchased_on);return a!==null&&a>60}).reduce((s,x)=>s+n(x.total_capital),0),unknownCapital=unknown.reduce((s,x)=>s+n(x.total_capital),0),missing=d.items.filter(x=>Object.keys(x.item_dna?.facts||{}).length<4).length;metrics.innerHTML=[['Kapitał w stocku',money(total)],['Kapitał 60+ dni (znana data)',money(old)],['Kapitał bez daty zakupu',money(unknownCapital)],['Item DNA do uzupełnienia',missing],['Źródło księgowe','Supabase HQ']].map(([a,v])=>`<article class="card metric"><div class="n">${safe(v)}</div><div class="label">${safe(a)}</div></article>`).join('');age.innerHTML=b.map(([l,t])=>{const a=stock.filter(t),v=a.reduce((s,x)=>s+n(x.total_capital),0);return`<div class="feed-item"><b>${safe(l)} · ${money(v)}</b><p class="muted small">${a.length} itemów</p></div>`}).join('');meaning.innerHTML=`<div class="feed-item"><b>${money(old)} kapitału ma potwierdzony wiek 60+ dni.</b><p class="muted small">Sygnał do Pricing i audytu prezentacji, nie automatyczna przecena.</p></div><div class="feed-item"><b>${money(unknownCapital)} kapitału nie ma daty zakupu.</b><p class="muted small">Nie jest zaliczany do świeżego ani starego stocku — wymaga ostrożnej interpretacji rotacji.</p></div><div class="feed-item"><b>${missing} itemów ma niepełne DNA.</b><p class="muted small">Uzupełnij przed silnymi wnioskami o rotacji.</p></div>`}catch(e){app.innerHTML=`<div class="notice">Nie udało się wczytać finansów: ${safe(e.message||e)}</div>`}}</script></html>
