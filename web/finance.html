<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Finanse · FADEWELL HQ</title><link rel="stylesheet" href="hq.css"><main><header class="top"><div><div class="eyebrow">FADEWELL HQ · Finanse</div><h1>Kapitał, rotacja i ryzyko.</h1><p class="muted">Wiek z nieznaną datą jest pokazywany jako dolna granica, nie jako fikcyjna data.</p></div><span class="badge">Canonical</span></header><nav id="nav"></nav><div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div><section id="app" hidden><section id="metrics" class="grid"></section><section class="split"><article class="card"><h2>Kapitał według wieku stocku</h2><div id="age" class="feed"></div></article><article class="card"><h2>Co to znaczy dziś</h2><div id="meaning" class="feed"></div></article></section></section></main><script type="module">import{shell,data,$,safe,money}from'./hq.js';const n=x=>Number(x)||0,days=x=>x?Math.max(0,Math.floor((Date.now()-new Date(x))/864e5)):null;if(await shell('finance.html')){app.hidden=false;try{const d=await data(),stock=d.items.filter(x=>x.ledger_status!=='SOLD'),bound=stock.filter(x=>!x.purchased_on&&x.purchased_before),boundCapital=bound.reduce((s,x)=>s+n(x.total_capital),0),knownOld=stock.filter(x=>(days(x.purchased_on)||0)>60).reduce((s,x)=>s+n(x.total_capital),0),total=stock.reduce((s,x)=>s+n(x.total_capital),0),b=[['0–30 dni',x=>{const a=days(x.purchased_on);return a!==null&&a<=30},'age=0-30'],['31–60 dni',x=>{const a=days(x.purchased_on);return a!==null&&a>30&&a<=60},'age=31-60'],['61–90 dni',x=>{const a=days(x.purchased_on);return a!==null&&a>60&&a<=90},'age=61-90'],['90+ dni',x=>{const a=days(x.purchased_on);return a!==null&&a>90},'age=90+'],['Co najmniej wiek graniczny',x=>!x.purchased_on&&x.purchased_before,'age=bound']],missing=d.items.filter(x=>Object.keys(x.item_dna?.facts||{}).length<4).length;metrics.innerHTML=[['Kapitał w stocku',money(total)],['60+ dni (dokładna data)',money(knownOld)],['Kapitał z dolną granicą wieku',money(boundCapital)],['DNA do uzupełnienia',missing]].map(([a,v])=>`<article class="card metric"><div class="n">${safe(v)}</div><div class="label">${safe(a)}</div></article>`).join('');age.innerHTML=b.map(([l,t,q])=>{const a=stock.filter(t),v=a.reduce((s,x)=>s+n(x.total_capital),0);return`<a class="feed-item text-link" href="ledger.html?${q}"><b>${safe(l)} · ${money(v)}</b><p class="muted small">${a.length} itemów → Ledger</p></a>`}).join('');meaning.innerHTML=`<div class="feed-item"><b>${money(boundCapital)} · co najmniej ~${bound.length?Math.min(...bound.map(x=>days(x.purchased_before))):0} dni.</b><p class="muted small">Zakup przed 06.2026; dokładna data nadal nieznana.</p></div><div class="feed-item"><b>${money(knownOld)} ma potwierdzony wiek 60+ dni.</b><p class="muted small">Sygnał do Pricing i audytu prezentacji, nie automatyczna przecena.</p></div>`}catch(e){app.innerHTML=`<div class="notice">Nie udało się wczytać finansów: ${safe(e.message||e)}</div>`}}</script></html>
