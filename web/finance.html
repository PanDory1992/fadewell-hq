<!doctype html><html lang="pl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Finanse · FADEWELL HQ</title><link rel="stylesheet" href="hq.css"><main><header class="top"><div><div class="eyebrow">FADEWELL HQ · Finanse</div><h1>Kapitał, rotacja i przepływ gotówki.</h1><p class="muted">Niepewna data zakupu pozostaje granicą wieku, nie wymyśloną datą.</p></div><span class="badge">Canonical</span></header><nav id="nav"></nav><div class="row-actions"><button id="login">Zaloguj przez GitHub</button><button id="logout" hidden class="secondary">Wyloguj</button><span id="status" class="muted small"></span></div><section id="app" hidden><section id="metrics" class="grid"></section><section class="split"><article class="card"><h2>Kapitał według wieku</h2><div id="age" class="feed"></div></article><article class="card"><h2>Co oznaczają liczby</h2><div id="meaning" class="feed"></div></article></section></section></main><script type="module">import{shell,data,$,safe,money}from'./hq.js?v=20260719-title';const n=x=>Number(x)||0,days=x=>x?Math.max(0,Math.floor((Date.now()-new Date(x))/864e5)):null;if(await shell('finance.html')){app.hidden=false;try{const d=await data(),stock=d.items.filter(x=>x.ledger_status!=='SOLD'),bound=stock.filter(x=>!x.purchased_on&&x.purchased_before),capital=stock.reduce((s,x)=>s+n(x.total_capital),0),boundCapital=bound.reduce((s,x)=>s+n(x.total_capital),0),gmail=d.gmailEvents||[],inTransit=gmail.filter(x=>x.event_type==='SALE_PENDING'&&x.state!=='MANUAL_RESOLVED').reduce((s,x)=>s+n(x.amount),0),available=gmail.filter(x=>x.event_type==='SALE_CONFIRMED').reduce((s,x)=>s+n(x.amount),0),b=[['0–30 dni',x=>{const a=days(x.purchased_on);return a!==null&&a<=30}],['31–60 dni',x=>{const a=days(x.purchased_on);return a!==null&&a>30&&a<=60}],['61–90 dni',x=>{const a=days(x.purchased_on);return a!==null&&a>60&&a<=90}],['90+ dni',x=>{const a=days(x.purchased_on);return a!==null&&a>90}],['Co najmniej od 01.06.2026',x=>!x.purchased_on&&x.purchased_before]];metrics.innerHTML=[['Kapitał w stocku',money(capital)],['Kapitał z dolną granicą wieku',money(boundCapital)],['Gotówka w drodze',money(inTransit)],['Gotówka potwierdzona',money(available)]].map(([a,v])=>`<article class="card metric"><div class="n">${safe(v)}</div><div class="label">${safe(a)}</div></article>`).join('');age.innerHTML=b.map(([l,test])=>{const g=stock.filter(test);return`<a class="feed-item text-link" href="ledger.html"><b>${safe(l)} · ${money(g.reduce((s,x)=>s+n(x.total_capital),0))}</b><p class="muted small">${g.length} itemów → Ledger</p></a>`}).join('');meaning.innerHTML=`<div class="feed-item"><b>${money(inTransit)} w drodze</b><p class="muted small">SALE_PENDING: sprzedaż zaksięgowana, ale wypłata nie jest jeszcze potwierdzona.</p></div><div class="feed-item"><b>${money(available)} potwierdzone</b><p class="muted small">SALE_CONFIRMED wyznacza dostępną gotówkę.</p></div><div class="feed-item"><b>${money(boundCapital)} ma minimum wieku</b><p class="muted small">Zakup przed 06.2026; dokładna data pozostaje nieznana.</p></div>`}catch(e){app.innerHTML=`<div class="notice">Nie udało się wczytać finansów: ${safe(e.message||e)}</div>`}}</script></html>
