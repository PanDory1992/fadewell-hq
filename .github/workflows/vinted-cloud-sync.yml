name: Sync Vinted Live Wardrobe

on:
  schedule:
    # Offset from the busiest GitHub Actions minutes; still every 15 minutes.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vinted-live-wardrobe-sync
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --disable-pip-version-check cloudscraper requests
      - name: Fetch and upload a complete Vinted snapshot
        id: collect
        continue-on-error: ${{ github.event_name == 'schedule' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VINTED_USER_ID: '271911480'
        run: |
          for attempt in 1 2 3; do
            python cloud/vinted_snapshot_sync.py && exit 0
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep $((attempt * 30))
          done
      - name: Keep scheduled Vinted failure visible without notification spam
        if: ${{ github.event_name == 'schedule' && steps.collect.outcome == 'failure' }}
        run: echo "::warning title=Vinted collector stale::Vinted did not return a complete catalog. No partial snapshot was saved; HQ freshness remains the operational alert."
