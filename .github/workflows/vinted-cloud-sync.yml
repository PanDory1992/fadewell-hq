name: Sync Vinted Live Wardrobe

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode (manual collects now; watchdog tests freshness first)'
        required: true
        default: manual
        type: choice
        options:
          - manual
          - watchdog

permissions:
  contents: read

concurrency:
  group: vinted-live-wardrobe-sync
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install --disable-pip-version-check cloudscraper requests
      - name: Check freshness and run the fallback only when needed
        id: collect
        continue-on-error: ${{ inputs.mode == 'watchdog' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VINTED_USER_ID: '271911480'
          COLLECTOR_MODE: ${{ inputs.mode == 'watchdog' && 'watchdog' || 'manual' }}
          COLLECTOR_SOURCE: ${{ inputs.mode == 'watchdog' && 'GITHUB_FALLBACK' || 'GITHUB_MANUAL' }}
        run: |
          for attempt in 1 2 3; do
            python cloud/vinted_snapshot_sync.py && exit 0
            if [ "$attempt" -eq 3 ]; then exit 1; fi
            sleep $((attempt * 30))
          done
      - name: Keep watchdog failure visible without notification spam
        if: ${{ inputs.mode == 'watchdog' && steps.collect.outcome == 'failure' }}
        run: echo "::warning title=Vinted collector stale::Vinted did not return a complete catalog. No partial snapshot was saved; HQ freshness remains the operational alert."
